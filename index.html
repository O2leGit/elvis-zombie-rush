<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elvis's Zombie Rush</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; touch-action:none; -webkit-touch-callout:none; user-select:none; }
body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Courier New',monospace; }
canvas { display:block; border:2px solid #2a0845; box-shadow:0 0 40px rgba(100,0,200,0.3); }
#touch-ui { display:none; position:fixed; bottom:0; left:0; right:0; height:140px; pointer-events:none; z-index:10; }
#touch-ui button { pointer-events:auto; position:absolute; border:none; font-weight:bold; font-family:'Courier New',monospace; opacity:0.55; -webkit-tap-highlight-color:transparent; }
#touch-ui button:active { opacity:0.85; transform:scale(1.08); }
#btn-left { bottom:20px; left:16px; width:64px; height:64px; background:rgba(200,200,255,0.2); color:#aac; font-size:28px; border-radius:12px; }
#btn-right { bottom:20px; left:90px; width:64px; height:64px; background:rgba(200,200,255,0.2); color:#aac; font-size:28px; border-radius:12px; }
#btn-jump { bottom:20px; right:90px; width:72px; height:72px; background:rgba(80,220,120,0.25); color:#6e6; font-size:14px; border-radius:50%; }
#btn-blast { bottom:20px; right:10px; width:72px; height:72px; background:rgba(0,180,255,0.25); color:#4cf; font-size:13px; border-radius:50%; }
@media (max-width:1024px),(pointer:coarse) { #touch-ui{display:block;} }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touch-ui">
<button id="btn-left">&larr;</button>
<button id="btn-right">&rarr;</button>
<button id="btn-jump">JUMP</button>
<button id="btn-blast">BLADE</button>
</div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d');
C.width=900;C.height=550;
const W=900,H=550,GY=420;

// ========== AUDIO ENGINE ==========
const AC=new(window.AudioContext||window.webkitAudioContext)();
const masterGain=AC.createGain();
masterGain.gain.value=1.0;
masterGain.connect(AC.destination);

function snd(type){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(masterGain);
  const t=AC.currentTime;
  switch(type){
    case'jump':o.type='triangle';o.frequency.setValueAtTime(250,t);o.frequency.exponentialRampToValueAtTime(500,t+0.1);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);break;
    case'land':o.type='sine';o.frequency.setValueAtTime(90,t);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);break;
    case'coin':{o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(1400,t+.05);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.1);const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(masterGain);o2.type='sine';o2.frequency.setValueAtTime(1400,t+.06);o2.frequency.exponentialRampToValueAtTime(1800,t+.12);g2.gain.setValueAtTime(.12,t+.06);g2.gain.exponentialRampToValueAtTime(.001,t+.18);o2.start(t+.06);o2.stop(t+.18);break;}
    case'hit':{o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(40,t+.25);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);noiseBurst(.2,.15);break;}
    case'blast':{o.type='sawtooth';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(700,t+.06);o.frequency.exponentialRampToValueAtTime(35,t+.3);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35);noiseBurst(.25,.18);break;}
    case'zombiedeath':o.type='square';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(50,t+.25);g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);break;
    case'gameover':[400,280,180,120,70].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.16));o.type='square';g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.8);o.start(t);o.stop(t+.8);break;
    case'start':[350,460,580,700,900].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.07));o.type='square';g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.start(t);o.stop(t+.4);break;
    case'lunge':o.type='square';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(300,t+.06);o.frequency.exponentialRampToValueAtTime(50,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);break;
    case'groan':o.type='sawtooth';o.frequency.setValueAtTime(55+Math.random()*25,t);o.frequency.exponentialRampToValueAtTime(40,t+.6);g.gain.setValueAtTime(.07,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);break;
    case'thunder':{o.type='sawtooth';o.frequency.setValueAtTime(45,t);o.frequency.setValueAtTime(30,t+.4);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+1);o.start(t);o.stop(t+1);noiseBurst(.8,.25);break;}
    case'step':o.type='sine';o.frequency.setValueAtTime(55+Math.random()*35,t);g.gain.setValueAtTime(.03,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.start(t);o.stop(t+.04);break;
  }
}
function noiseBurst(dur,vol){
  const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*vol*(1-i/d.length);
  const s=AC.createBufferSource(),ng=AC.createGain();s.buffer=b;s.connect(ng);ng.connect(masterGain);
  ng.gain.setValueAtTime(vol,AC.currentTime);ng.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);s.start();
}

// ========== HORROR AMBIENT SOUNDSCAPE ==========
let ambientOn=false;
function startAmbient(){
  if(ambientOn)return;ambientOn=true;const t=AC.currentTime;

  // LAYER 1: Deep sub-bass drone with slow wobble
  const dr=AC.createOscillator(),drg=AC.createGain(),drf=AC.createBiquadFilter();
  dr.type='sawtooth';dr.frequency.value=36;
  drf.type='lowpass';drf.frequency.value=70;
  dr.connect(drf);drf.connect(drg);drg.connect(masterGain);drg.gain.value=.08;dr.start();
  // LFO wobble on drone
  const lfo=AC.createOscillator(),lfog=AC.createGain();
  lfo.type='sine';lfo.frequency.value=.12;lfog.gain.value=4;
  lfo.connect(lfog);lfog.connect(dr.frequency);lfo.start();

  // LAYER 2: Dissonant high drone (tritone interval = maximum creepy)
  const dr2=AC.createOscillator(),dr2g=AC.createGain();
  dr2.type='sine';dr2.frequency.value=51; // tritone of 36hz
  dr2.connect(dr2g);dr2g.connect(masterGain);dr2g.gain.value=.04;dr2.start();
  // Second LFO for phasing
  const lfo2=AC.createOscillator(),lfo2g=AC.createGain();
  lfo2.type='sine';lfo2.frequency.value=.07;lfo2g.gain.value=2;
  lfo2.connect(lfo2g);lfo2g.connect(dr2.frequency);lfo2.start();

  // LAYER 3: Wind -- filtered noise, constantly playing
  const windBuf=AC.createBuffer(1,AC.sampleRate*6,AC.sampleRate),wd=windBuf.getChannelData(0);
  for(let i=0;i<wd.length;i++)wd[i]=(Math.random()*2-1)*.5*(0.3+0.7*Math.sin(i/AC.sampleRate*.3)**2);
  const wind=AC.createBufferSource(),wg=AC.createGain(),wf=AC.createBiquadFilter();
  wind.buffer=windBuf;wind.loop=true;wf.type='bandpass';wf.frequency.value=500;wf.Q.value=.8;
  wind.connect(wf);wf.connect(wg);wg.connect(masterGain);wg.gain.value=.06;wind.start();
  // Modulate wind filter for gusting
  const wlfo=AC.createOscillator(),wlfog=AC.createGain();
  wlfo.type='sine';wlfo.frequency.value=.2;wlfog.gain.value=200;
  wlfo.connect(wlfog);wlfog.connect(wf.frequency);wlfo.start();

  // LAYER 4: Heartbeat -- double thump every 1.1s
  setInterval(()=>{
    if(state!=='playing')return;
    const now=AC.currentTime;
    for(let i=0;i<2;i++){
      const b=AC.createOscillator(),bg=AC.createGain();
      b.type='sine';b.frequency.setValueAtTime(50,now+i*.14);b.frequency.exponentialRampToValueAtTime(28,now+i*.14+.12);
      b.connect(bg);bg.connect(masterGain);
      bg.gain.setValueAtTime(i===0?.12:.07,now+i*.14);bg.gain.exponentialRampToValueAtTime(.001,now+i*.14+.14);
      b.start(now+i*.14);b.stop(now+i*.14+.14);
    }
  },1100);

  // LAYER 5: Random scares -- whispers, screams, creaks, growls
  setInterval(()=>{
    if(state!=='playing')return;
    const now=AC.currentTime,r=Math.random();
    if(r<.25){
      // Whisper -- breathy filtered noise
      const wb=AC.createBuffer(1,AC.sampleRate*.8,AC.sampleRate),wbd=wb.getChannelData(0);
      for(let i=0;i<wbd.length;i++)wbd[i]=(Math.random()*2-1)*(1-i/wbd.length)*.3;
      const ws=AC.createBufferSource(),wsg=AC.createGain(),wsf=AC.createBiquadFilter();
      ws.buffer=wb;wsf.type='bandpass';wsf.frequency.value=2500+Math.random()*2000;wsf.Q.value=4;
      ws.connect(wsf);wsf.connect(wsg);wsg.connect(masterGain);
      wsg.gain.setValueAtTime(.06,now);wsg.gain.exponentialRampToValueAtTime(.001,now+.8);ws.start(now);
    } else if(r<.45){
      // Distant scream -- rising/falling pitch
      const sc=AC.createOscillator(),sg=AC.createGain();
      sc.type='sawtooth';sc.frequency.setValueAtTime(250,now);sc.frequency.exponentialRampToValueAtTime(1000,now+.2);sc.frequency.exponentialRampToValueAtTime(180,now+.6);
      sc.connect(sg);sg.connect(masterGain);sg.gain.setValueAtTime(.015,now);sg.gain.setValueAtTime(.04,now+.1);sg.gain.exponentialRampToValueAtTime(.001,now+.7);
      sc.start(now);sc.stop(now+.7);
    } else if(r<.6){
      // Door creak
      const cr=AC.createOscillator(),cg=AC.createGain();
      cr.type='triangle';cr.frequency.setValueAtTime(250+Math.random()*150,now);
      cr.frequency.exponentialRampToValueAtTime(500+Math.random()*200,now+.15);cr.frequency.exponentialRampToValueAtTime(120,now+.4);
      cr.connect(cg);cg.connect(masterGain);cg.gain.setValueAtTime(.03,now);cg.gain.exponentialRampToValueAtTime(.001,now+.4);
      cr.start(now);cr.stop(now+.4);
    } else if(r<.75){
      // Low growl
      const gr=AC.createOscillator(),gg=AC.createGain(),gf=AC.createBiquadFilter();
      gr.type='sawtooth';gr.frequency.setValueAtTime(60+Math.random()*20,now);
      gf.type='lowpass';gf.frequency.value=120;
      gr.connect(gf);gf.connect(gg);gg.connect(masterGain);
      gg.gain.setValueAtTime(.08,now);gg.gain.exponentialRampToValueAtTime(.001,now+.8);
      gr.start(now);gr.stop(now+.8);
    } else if(r<.85){
      // Chains rattling -- fast noise bursts
      for(let i=0;i<5;i++){
        const nb=AC.createBuffer(1,AC.sampleRate*.03,AC.sampleRate),nd=nb.getChannelData(0);
        for(let j=0;j<nd.length;j++)nd[j]=(Math.random()*2-1)*.4;
        const ns=AC.createBufferSource(),ng=AC.createGain(),nf=AC.createBiquadFilter();
        ns.buffer=nb;nf.type='highpass';nf.frequency.value=3000;
        ns.connect(nf);nf.connect(ng);ng.connect(masterGain);
        ng.gain.setValueAtTime(.04,now+i*.06);ng.gain.exponentialRampToValueAtTime(.001,now+i*.06+.04);
        ns.start(now+i*.06);
      }
    }
  },2500+Math.random()*1500);

  // LAYER 6: Periodic deep boom (every ~8s)
  setInterval(()=>{
    if(state!=='playing')return;
    const now=AC.currentTime;
    const boom=AC.createOscillator(),bg=AC.createGain();
    boom.type='sine';boom.frequency.setValueAtTime(35,now);boom.frequency.exponentialRampToValueAtTime(15,now+1);
    boom.connect(bg);bg.connect(masterGain);bg.gain.setValueAtTime(.1,now);bg.gain.exponentialRampToValueAtTime(.001,now+1.2);
    boom.start(now);boom.stop(now+1.2);
    noiseBurst(.4,.08);
  },8000+Math.random()*4000);
}

// ========== GAME STATE ==========
let state='start',score=0,lives=3,invT=0,blastCD=0,frame=0;
const BLAST_CD=.8; // seconds
let shakeT=0,shakeI=0,lightT=0,lightX=0;

// ========== PHYSICS (pixels per second) ==========
const GRAVITY=1800, JUMP_VEL=-700, MOVE_SPD=420, FRICTION=.85;

// ========== PLAYER ==========
const P={x:120,y:GY-48,w:36,h:48,vy:0,vx:0,gnd:true,face:1,anim:0,run:false,wasGnd:true};

// ========== ENTITIES ==========
let zombies=[],coins=[],blasts=[],particles=[],rain=[],clouds=[],tombs=[],bats=[];

// ========== INPUT ==========
const K={},T={left:false,right:false,jump:false,blast:false};
document.addEventListener('keydown',e=>{K[e.code]=true;if(e.code==='Space')e.preventDefault();if(state!=='playing')go();});
document.addEventListener('keyup',e=>{K[e.code]=false;});
C.addEventListener('click',()=>{if(state!=='playing')go();});
C.addEventListener('touchstart',e=>{e.preventDefault();AC.resume();if(state!=='playing')go();},{passive:false});
function bindBtn(id,key){const b=document.getElementById(id);if(!b)return;
  const on=e=>{e.preventDefault();T[key]=true;if(state!=='playing')go();};
  const off=e=>{e.preventDefault();T[key]=false;};
  b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('touchcancel',off,{passive:false});b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);
}
bindBtn('btn-left','left');bindBtn('btn-right','right');bindBtn('btn-jump','jump');bindBtn('btn-blast','blast');

// ========== AUTO RESIZE ==========
function resize(){
  const mob=window.innerWidth<=1024||'ontouchstart'in window;
  const pad=mob?0:20,bp=mob?140:0;
  const s=Math.min((window.innerWidth-pad*2)/W,(window.innerHeight-pad*2-bp)/H,1.5);
  C.style.width=(W*s)+'px';C.style.height=(H*s)+'px';
  if(mob){C.style.border='none';C.style.boxShadow='none';}
}
window.addEventListener('resize',resize);resize();

// ========== INIT ENVIRONMENT ==========
function initEnv(){
  rain=[];for(let i=0;i<140;i++)rain.push({x:Math.random()*W,y:Math.random()*H,s:3+Math.random()*5,sp:500+Math.random()*400,w:.4+Math.random()*.4});
  clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W,y:15+Math.random()*80,w:100+Math.random()*150,h:25+Math.random()*40,sp:12+Math.random()*20});
  tombs=[];for(let i=0;i<8;i++)tombs.push({x:55+i*105+Math.random()*40,h:18+Math.random()*25,w:14+Math.random()*10,tilt:(Math.random()-.5)*.15});
  bats=[];for(let i=0;i<6;i++)bats.push({x:Math.random()*W,y:50+Math.random()*130,sp:60+Math.random()*100,amp:18+Math.random()*30,ph:Math.random()*6.28,wt:Math.random()*10});
}
initEnv();

function go(){AC.resume();snd('start');startAmbient();state='playing';score=0;lives=3;invT=0;blastCD=0;
  P.x=120;P.y=GY-P.h;P.vy=0;P.vx=0;P.gnd=true;zombies=[];coins=[];blasts=[];particles=[];initEnv();}

// ========== PARTICLES ==========
function emit(x,y,col,n,sp,up,sz){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*(sp||400),vy:(Math.random()-.5)*(sp||400)-(up||150),life:.4+Math.random()*.5,mx:.9,col,sz:1.5+Math.random()*(sz||3),grav:600});}

// ========== COLLISION ==========
function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ========== SPAWN (all speeds in px/sec) ==========
let spawnZT=0,spawnCT=0;
function spawnZ(){
  const sp=280+Math.min(score/3,400);
  const R=Math.random()>.3,big=Math.random()>.68,runner=!big&&Math.random()>.45;
  const mul=runner?2.0:(.7+Math.random()*.6);
  zombies.push({x:R?W+20:-50,y:GY-(big?50:42),w:big?36:30,h:big?50:42,
    vx:R?-sp*mul:sp*mul,anim:0,type:big?'big':(runner?'runner':'normal'),
    hp:big?2:1,lungeCD:runner?1+Math.random()*1.5:0});
  if(Math.random()>.4)snd('groan');
}
function spawnC(){
  coins.push({x:40+Math.random()*(W-80),y:GY-70-Math.random()*150,w:18,h:18,val:Math.random()>.8?50:10,t:Math.random()*6.28});
}

// ========== DRAW HELPERS ==========
function shadow(x,y,w){const g=X.createRadialGradient(x+w/2,GY+2,0,x+w/2,GY+2,w*.7);g.addColorStop(0,'rgba(0,0,0,.35)');g.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=g;X.beginPath();X.ellipse(x+w/2,GY+2,w*.7,6,0,0,6.28);X.fill();}
function roundRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath();X.fill();}

// ========== DRAW BACKGROUND ==========
function drawBG(dt){
  // Sky
  const sg=X.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#050510');sg.addColorStop(.3,'#0c0828');sg.addColorStop(.6,'#150c3a');sg.addColorStop(1,'#1a0e45');
  X.fillStyle=sg;X.fillRect(0,0,W,H);

  // Lightning
  if(lightT>0){X.fillStyle=`rgba(200,180,255,${lightT*.15})`;X.fillRect(0,0,W,H);
    if(lightT>.7){X.strokeStyle=`rgba(255,255,255,${lightT*.08})`;X.lineWidth=2;X.beginPath();let lx=lightX,ly=0;X.moveTo(lx,ly);for(let i=0;i<8;i++){lx+=(Math.random()-.5)*40;ly+=25+Math.random()*20;X.lineTo(lx,ly);}X.stroke();X.lineWidth=6;X.strokeStyle=`rgba(200,180,255,${lightT*.03})`;X.stroke();}
    lightT-=dt*1.5;if(lightT<0)lightT=0;}

  // Stars
  for(let i=0;i<80;i++){const sx=(i*137.5)%W,sy=(i*97.3)%280,tw=Math.sin(frame*.03+i*2.1)*.4+.6,sz=((i*3.7)%2)+.5;
    X.fillStyle=`rgba(255,255,220,${tw*.7})`;X.fillRect(sx|0,sy|0,sz,sz);}

  // Moon
  const mx=680,my=65,mr=36;
  for(let r=mr+40;r>mr;r-=4){X.fillStyle=`rgba(200,180,140,${.01*(mr+40-r)})`;X.beginPath();X.arc(mx,my,r,0,6.28);X.fill();}
  X.fillStyle='#e8dcc8';X.beginPath();X.arc(mx,my,mr,0,6.28);X.fill();
  X.fillStyle='#050510';X.beginPath();X.arc(mx+14,my-8,mr-4,0,6.28);X.fill();

  // Clouds
  clouds.forEach(c=>{c.x+=c.sp*dt;if(c.x>W+100)c.x=-c.w-50;
    X.fillStyle='rgba(15,10,30,.6)';X.beginPath();X.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,6.28);X.ellipse(c.x+c.w*.3,c.y-c.h*.2,c.w*.35,c.h*.4,0,0,6.28);X.fill();});

  // Bats
  bats.forEach(b=>{b.x+=b.sp*dt;b.wt+=dt*8;if(b.x>W+30)b.x=-30;
    const by=b.y+Math.sin(frame*.04+b.ph)*b.amp,wing=Math.sin(b.wt)*6;
    X.fillStyle='#0a0015';X.fillRect(b.x-1|0,by|0,3,2);
    X.beginPath();X.moveTo(b.x,by);X.lineTo(b.x-8,by-wing);X.lineTo(b.x-4,by+1);X.fill();
    X.beginPath();X.moveTo(b.x+2,by);X.lineTo(b.x+10,by-wing);X.lineTo(b.x+6,by+1);X.fill();});

  // Treeline
  X.fillStyle='#080418';for(let i=0;i<W;i+=3){const th=60+Math.sin(i*.02)*25+Math.sin(i*.05)*15+Math.sin(i*.13)*8;X.fillRect(i,GY-100-th,3,th+100);}

  // Haunted house
  const hx=520;X.fillStyle='#0a0418';X.fillRect(hx,GY-180,130,180);
  X.beginPath();X.moveTo(hx-15,GY-180);X.lineTo(hx+65,GY-240);X.lineTo(hx+145,GY-180);X.fill();
  X.fillRect(hx+45,GY-270,35,90);X.beginPath();X.moveTo(hx+40,GY-270);X.lineTo(hx+62,GY-310);X.lineTo(hx+85,GY-270);X.fill();
  X.fillRect(hx+110,GY-220,14,40);
  const f1=.4+Math.sin(frame*.07)*.15,f2=.35+Math.sin(frame*.09+1)*.12;
  [[hx+25,GY-140,f1],[hx+75,GY-140,f2],[hx+50,GY-100,f1*.8],[hx+55,GY-285,f2]].forEach(([wx,wy,f])=>{
    const wg=X.createRadialGradient(wx+8,wy+10,0,wx+8,wy+10,30);wg.addColorStop(0,`rgba(255,180,60,${f*.25})`);wg.addColorStop(1,'rgba(255,180,60,0)');
    X.fillStyle=wg;X.fillRect(wx-20,wy-18,56,56);X.fillStyle=`rgba(255,190,80,${f})`;X.fillRect(wx,wy,16,20);
    X.fillStyle='#0a0418';X.fillRect(wx+7,wy,2,20);X.fillRect(wx,wy+9,16,2);});
  X.fillStyle='#060310';X.fillRect(hx+48,GY-50,30,50);

  // Tombstones
  tombs.forEach(ts=>{X.save();X.translate(ts.x+ts.w/2,GY);X.rotate(ts.tilt);X.fillStyle='#1a1428';X.fillRect(-ts.w/2,-ts.h,ts.w,ts.h);X.beginPath();X.arc(0,-ts.h,ts.w/2,Math.PI,0);X.fill();X.fillStyle='#120e20';X.fillRect(-1,-ts.h+4,2,10);X.fillRect(-4,-ts.h+7,8,2);X.restore();});

  // Fence
  X.fillStyle='#110a22';for(let i=0;i<W;i+=28){X.fillRect(i,GY-28,3,28);X.beginPath();X.moveTo(i-1,GY-28);X.lineTo(i+1.5,GY-35);X.lineTo(i+4,GY-28);X.fill();}
  X.fillRect(0,GY-18,W,3);X.fillRect(0,GY-8,W,3);

  // Ground
  const gg=X.createLinearGradient(0,GY,0,H);gg.addColorStop(0,'#120a25');gg.addColorStop(.5,'#0a0618');gg.addColorStop(1,'#060412');
  X.fillStyle=gg;X.fillRect(0,GY,W,H-GY);
  for(let i=0;i<W;i+=8){const gh=3+Math.sin(i*.4+frame*.03)*2;X.fillStyle='#0e1a0a';X.fillRect(i,GY-gh,2,gh);}

  // Fog
  for(let i=0;i<8;i++){const fx=(frame*.4+i*130)%(W+200)-100,fy=GY-5+Math.sin(frame*.02+i)*4;
    const fg=X.createRadialGradient(fx,fy,0,fx,fy,80);fg.addColorStop(0,`rgba(80,60,120,${.06+Math.sin(frame*.015+i)*.02})`);fg.addColorStop(1,'rgba(80,60,120,0)');
    X.fillStyle=fg;X.beginPath();X.ellipse(fx,fy,80,15,0,0,6.28);X.fill();}

  // Rain
  X.strokeStyle='rgba(150,140,200,.3)';X.lineWidth=.8;
  rain.forEach(r=>{r.y+=r.sp*dt;r.x-=80*dt;if(r.y>H){r.y=-10;r.x=Math.random()*W;}if(r.x<0)r.x=W;
    X.beginPath();X.moveTo(r.x|0,r.y|0);X.lineTo((r.x-1.5)|0,(r.y+r.s)|0);X.stroke();});
}

// ========== DRAW NINJA ==========
function drawNinja(){
  if(invT>0&&Math.floor(frame/3)%2===0)return;
  const px=P.x|0,py=P.y|0,f=P.face;
  shadow(px,py,P.w);
  // Scarf
  const sw=Math.sin(frame*.12)*4,sw2=Math.sin(frame*.15+1)*3;
  X.fillStyle='#cc1122';X.fillRect(px+(f>0?6:22),py+4,2,10);X.fillRect(px+(f>0?4:24)+sw*.5,py+8,2,10);
  X.fillRect(px+(f>0?2:26)+sw,py+12,2,8);X.fillStyle='#aa0e1a';X.fillRect(px+(f>0?1:27)+sw2,py+16,2,6);
  // Body
  X.fillStyle='#1a0e30';X.fillRect(px+10,py+10,16,22);X.fillStyle='#221640';X.fillRect(px+12,py+12,12,8);
  // Head
  X.fillStyle='#14082a';X.fillRect(px+9,py,18,14);X.fillStyle='#0a0418';X.fillRect(px+9,py+4,18,5);
  const blink=frame%180<3?1:4;X.fillStyle='#ff2020';X.fillRect(px+(f>0?18:10),py+5,5,blink);
  if(blink>1){const eg=X.createRadialGradient(px+(f>0?20:12),py+6,0,px+(f>0?20:12),py+6,8);eg.addColorStop(0,'rgba(255,40,40,.3)');eg.addColorStop(1,'rgba(255,0,0,0)');X.fillStyle=eg;X.fillRect(px+(f>0?14:4),py,14,14);}
  // Belt
  X.fillStyle='#4a1a1a';X.fillRect(px+10,py+28,16,3);X.fillStyle='#c8a820';X.fillRect(px+15,py+28,6,3);
  // Sword
  X.fillStyle='#606070';X.fillRect(px+(f>0?5:26),py-8,3,30);X.fillStyle='#c8a820';X.fillRect(px+(f>0?3:24),py+16,7,3);
  // Arms
  if(blastCD>.6){X.fillStyle='#14082a';X.fillRect(px+(f>0?26:-2),py+12,12*f,5);
    const cs=3+Math.sin(frame*.4)*2,cg=X.createRadialGradient(px+(f>0?38:-2),py+14,0,px+(f>0?38:-2),py+14,cs+6);
    cg.addColorStop(0,'rgba(100,220,255,.8)');cg.addColorStop(.5,'rgba(50,150,255,.3)');cg.addColorStop(1,'rgba(0,100,255,0)');
    X.fillStyle=cg;X.beginPath();X.arc(px+(f>0?38:-2),py+14,cs+6,0,6.28);X.fill();
  } else {const as=P.run?Math.sin(P.anim*.3)*5:0;X.fillStyle='#14082a';X.fillRect(px+6,py+12+as,4,14);X.fillRect(px+26,py+12-as,4,14);}
  // Legs
  const lo=P.run?Math.sin(P.anim*.25)*6:0;X.fillStyle='#120828';X.fillRect(px+11,py+32,6,14+lo);X.fillRect(px+19,py+32,6,14-lo);
  X.fillStyle='#1a1025';X.fillRect(px+10,py+44+lo,8,4);X.fillRect(px+18,py+44-lo,8,4);
}

// ========== DRAW ZOMBIE ==========
function drawZombie(z){
  const px=z.x|0,py=z.y|0,big=z.type==='big',runner=z.type==='runner',s=big?1.3:1;
  shadow(px,py,z.w);
  const bc=big?'#2a4a1a':runner?'#2a3a18':'#3a6a28',dc=big?'#1e3512':runner?'#1a2a10':'#2a501a';
  X.fillStyle=bc;X.fillRect(px+4*s,py+10*s,22*s,22*s);X.fillStyle=big?'#3a2818':runner?'#2a1a10':'#4a3a28';X.fillRect(px+4*s,py+10*s,22*s,5*s);
  // Head
  X.fillStyle=big?'#3a5a2a':runner?'#2a4a1a':'#4a7a38';X.fillRect(px+6*s,py,18*s,14*s);X.fillStyle=dc;X.fillRect(px+6*s,py+3*s,18*s,2*s);
  // Eyes
  const eG=Math.sin(frame*.08)*.2+.8,eC=runner?`rgba(255,40,40,${eG})`:`rgba(255,255,0,${eG})`;
  X.fillStyle=eC;X.fillRect(px+8*s,py+5*s,4*s,3*s);X.fillRect(px+18*s,py+5*s,3*s,4*s);
  if(runner){const rg=X.createRadialGradient(px+10*s,py+6*s,0,px+10*s,py+6*s,8);rg.addColorStop(0,'rgba(255,0,0,.3)');rg.addColorStop(1,'rgba(255,0,0,0)');X.fillStyle=rg;X.fillRect(px+4*s,py,20*s,14*s);}
  X.fillStyle=runner?'#400':'#220';X.fillRect(px+9*s,py+6*s,2*s,2*s);X.fillRect(px+19*s,py+6*s,1.5*s,2*s);
  // Mouth
  X.fillStyle='#1a2a10';X.fillRect(px+10*s,py+10*s,10*s,3*s);X.fillStyle='#ccc';X.fillRect(px+11*s,py+10*s,2*s,2*s);X.fillRect(px+16*s,py+10*s,2*s,2*s);
  // Blood
  X.fillStyle='rgba(120,10,10,.6)';X.fillRect(px+14*s,py+14*s,2,4);
  if(big){X.fillRect(px+8*s,py+22*s,3,5);X.fillRect(px+20*s,py+16*s,2,6);}
  if(runner){X.fillStyle='rgba(150,10,10,.7)';X.fillRect(px+6*s,py+12*s,2,8);X.fillRect(px+20*s,py+10*s,2,10);X.fillRect(px+12*s,py+8*s,3,5);X.fillStyle='rgba(80,5,5,.5)';X.fillRect(px+8*s,py+15*s,1,6);X.fillRect(px+10*s,py+14*s,1,7);X.fillRect(px+12*s,py+15*s,1,6);}
  // Arms
  const aw=Math.sin(z.anim*.12)*4;X.fillStyle=bc;X.fillRect(px-2*s,py+12*s+aw,6*s,5*s);X.fillRect(px+24*s,py+14*s-aw,6*s,5*s);
  // Legs
  const lw=Math.sin(z.anim*.08)*4;X.fillStyle=dc;X.fillRect(px+7*s,py+30*s,6*s,12+lw);X.fillRect(px+17*s,py+30*s,6*s,12-lw);
}

// ========== DRAW COIN ==========
function drawCoin(c){
  const px=c.x,py=c.y,bob=Math.sin(frame*.06+c.t)*3,gem=c.val===50;
  const gg=X.createRadialGradient(px+9,py+9+bob,0,px+9,py+9+bob,18);gg.addColorStop(0,gem?'rgba(0,255,100,.2)':'rgba(255,215,0,.2)');gg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=gg;X.beginPath();X.arc(px+9,py+9+bob,18,0,6.28);X.fill();
  if(gem){X.fillStyle='#00dd66';X.beginPath();X.moveTo(px+9,py+bob);X.lineTo(px+18,py+9+bob);X.lineTo(px+9,py+18+bob);X.lineTo(px,py+9+bob);X.closePath();X.fill();
    X.fillStyle='rgba(255,255,255,.4)';X.beginPath();X.moveTo(px+9,py+bob);X.lineTo(px+13,py+6+bob);X.lineTo(px+9,py+9+bob);X.lineTo(px+5,py+6+bob);X.closePath();X.fill();
  } else {const sw=8+Math.sin(frame*.08+c.t)*6;X.fillStyle='#c8960a';X.beginPath();X.ellipse(px+9,py+9+bob,sw,9,0,0,6.28);X.fill();
    X.fillStyle='#f0c030';X.beginPath();X.ellipse(px+9,py+9+bob,sw*.75,7,0,0,6.28);X.fill();
    if(sw>5){X.fillStyle='#a07808';X.font='bold 10px serif';X.textAlign='center';X.fillText('$',px+9,py+13+bob);}}
}

// ========== DRAW BLAST ==========
function drawBlast(b){
  const p=b.life/b.mx,sz=8+(1-p)*8;
  const og=X.createRadialGradient(b.x,b.y,0,b.x,b.y,sz+12);og.addColorStop(0,`rgba(80,200,255,${p*.4})`);og.addColorStop(.5,`rgba(30,120,255,${p*.2})`);og.addColorStop(1,'rgba(0,60,255,0)');
  X.fillStyle=og;X.beginPath();X.arc(b.x,b.y,sz+12,0,6.28);X.fill();
  X.fillStyle=`rgba(150,230,255,${p*.9})`;X.beginPath();X.arc(b.x,b.y,sz,0,6.28);X.fill();
  X.fillStyle=`rgba(255,255,255,${p})`;X.beginPath();X.arc(b.x,b.y,sz*.35,0,6.28);X.fill();
  for(let i=1;i<5;i++){X.fillStyle=`rgba(100,200,255,${p*.3*(1-i*.2)})`;X.fillRect(b.x-b.vx*.003*i*2+(Math.random()-.5)*6-1.5,b.y+(Math.random()-.5)*6-1.5,3,3);}
}

// ========== HUD ==========
function drawHUD(){
  X.fillStyle='rgba(0,0,0,.5)';X.font='bold 22px Courier New';X.textAlign='left';X.fillText(`SCORE: ${score}`,22,32);
  X.fillStyle='#ffd700';X.fillText(`SCORE: ${score}`,20,30);
  for(let i=0;i<3;i++){const hx=W-35-i*32,hy=14;X.fillStyle=i<lives?'#ee1144':'#221828';
    [[2,0,4],[8,0,4],[0,2,12],[0,4,12],[1,6,10],[2,8,8],[3,10,6],[4,12,4],[5,14,2]].forEach(([ox,oy,w])=>{X.fillRect(hx+ox,hy+oy,w,2);});
    if(i<lives){X.fillStyle='rgba(255,255,255,.25)';X.fillRect(hx+3,hy+2,3,3);}}
  const cdP=blastCD/BLAST_CD;X.fillStyle='rgba(0,0,0,.4)';X.fillRect(19,42,82,10);X.fillStyle=cdP>0?'#334':'#00bbee';X.fillRect(20,43,(1-cdP)*80,8);
  if(cdP<=0){X.fillStyle=`rgba(0,200,255,${.3+Math.sin(frame*.1)*.15})`;X.fillRect(20,43,80,8);}
  X.fillStyle='#889';X.font='10px Courier New';X.textAlign='left';X.fillText('BLADE [X]',20,65);
  const lv=Math.min(Math.floor(score/200)+1,10);X.fillStyle='#a080cc';X.font='bold 13px Courier New';X.textAlign='right';X.fillText(`WAVE ${lv}`,W-20,60);
}

// ========== SCREENS ==========
function drawStart(){
  drawBG(1/60);X.fillStyle='rgba(0,0,0,.65)';X.fillRect(0,0,W,H);
  const g=Math.sin(frame*.04)*.4+.6;X.shadowColor='#ff2020';X.shadowBlur=25*g;
  X.fillStyle='#ff2828';X.font='bold 52px Courier New';X.textAlign='center';X.fillText("ELVIS'S",W/2,120);X.shadowBlur=0;
  X.shadowColor='#ff2020';X.shadowBlur=25*g;X.fillStyle='#ffd700';X.font='bold 56px Courier New';X.fillText('ZOMBIE RUSH',W/2,170);X.shadowBlur=0;
  const oldP={x:P.x,y:P.y,face:P.face};P.x=W/2-18;P.y=200;P.face=1;drawNinja();P.x=oldP.x;P.y=oldP.y;P.face=oldP.face;
  X.fillStyle='#bbb';X.font='15px Courier New';
  X.fillText('Arrow Keys / WASD -- Move',W/2,290);X.fillText('SPACE -- Jump',W/2,312);X.fillText('X -- Sword Blast Attack!',W/2,334);X.fillText('Collect money, slay zombies!',W/2,360);
  const p=Math.sin(frame*.07)*4;X.fillStyle='#1a8a3a';roundRect(W/2-85,390+p,170,52,8);X.fillStyle='#22bb44';roundRect(W/2-83,392+p,166,48,7);
  X.fillStyle='#fff';X.font='bold 26px Courier New';X.fillText('PLAY!',W/2,424+p);
}
function drawGameOver(){
  X.fillStyle='rgba(0,0,0,.8)';X.fillRect(0,0,W,H);
  X.shadowColor='#ff0000';X.shadowBlur=20;X.fillStyle='#ff1818';X.font='bold 52px Courier New';X.textAlign='center';X.fillText('GAME OVER',W/2,170);X.shadowBlur=0;
  X.fillStyle='#ffd700';X.font='bold 30px Courier New';X.fillText(`Score: ${score}`,W/2,230);
  let r='Keep practicing!';if(score>=100)r='Not bad!';if(score>=300)r='Awesome ninja!';if(score>=600)r='LEGENDARY!';if(score>=1000)r='UNSTOPPABLE!!!';
  X.fillStyle='#bb88ee';X.font='20px Courier New';X.fillText(r,W/2,270);
  const p=Math.sin(frame*.07)*3;X.fillStyle='#aa1830';roundRect(W/2-100,300+p,200,52,8);X.fillStyle='#dd2848';roundRect(W/2-98,302+p,196,48,7);
  X.fillStyle='#fff';X.font='bold 24px Courier New';X.fillText('RESTART',W/2,334+p);X.fillStyle='#777';X.font='13px Courier New';X.fillText('Press SPACE or ENTER',W/2,380);
}

// ========== UPDATE (delta-time based) ==========
function update(dt){
  frame++;
  if(state!=='playing')return;

  // Lightning
  if(Math.random()<.003){lightT=1.2;lightX=100+Math.random()*600;snd('thunder');}

  // Input
  let mv=false;
  if(K.ArrowLeft||K.KeyA||T.left){P.vx=-MOVE_SPD;P.face=-1;mv=true;}
  else if(K.ArrowRight||K.KeyD||T.right){P.vx=MOVE_SPD;P.face=1;mv=true;}
  else P.vx*=Math.pow(FRICTION,dt*60);
  P.run=mv;

  if((K.Space||K.ArrowUp||K.KeyW||T.jump)&&P.gnd){
    P.vy=JUMP_VEL;P.gnd=false;snd('jump');emit(P.x+P.w/2,GY,'rgba(60,40,80,.5)',4,200,0,2);T.jump=false;}

  // Blast
  if((K.KeyX||T.blast)&&blastCD<=0){
    blastCD=BLAST_CD;snd('blast');
    blasts.push({x:P.x+(P.face>0?38:-2),y:P.y+20,vx:P.face*1200,vy:0,life:.7,mx:.7});
    emit(P.x+P.w/2,P.y+20,'#00ccff',10,300,80,2);T.blast=false;}
  if(blastCD>0)blastCD-=dt;if(blastCD<0)blastCD=0;

  // Anim
  if(mv){P.anim+=dt*12;if(Math.floor(P.anim)%6===0&&P.gnd&&Math.random()<.3)snd('step');}

  // Physics
  P.vy+=GRAVITY*dt;P.x+=P.vx*dt;P.y+=P.vy*dt;
  P.wasGnd=P.gnd;
  if(P.y+P.h>=GY){if(!P.wasGnd&&P.vy>200){snd('land');emit(P.x+P.w/2,GY,'rgba(60,40,80,.4)',5,250,0,2);}P.y=GY-P.h;P.vy=0;P.gnd=true;}
  P.x=Math.max(0,Math.min(W-P.w,P.x));

  if(invT>0)invT-=dt;if(invT<0)invT=0;
  if(shakeT>0)shakeT-=dt;if(shakeT<0)shakeT=0;

  // Spawn timing
  const df=Math.min(score/150,6);
  const zRate=Math.max(.3,1.2-df*.14);
  const cRate=Math.max(.25,1-df*.08);
  spawnZT-=dt;if(spawnZT<=0){spawnZ();spawnZT=zRate;}
  spawnCT-=dt;if(spawnCT<=0){spawnC();spawnCT=cRate;}

  // Update zombies
  zombies.forEach(z=>{z.x+=z.vx*dt;z.anim+=dt*8;
    if(z.type==='runner'&&z.lungeCD!==undefined){z.lungeCD-=dt;
      const dist=Math.abs(z.x-P.x);
      if(z.lungeCD<=0&&dist<280&&dist>30){z.vx*=2.8;z.lungeCD=1.5+Math.random();snd('lunge');emit(z.x+z.w/2,z.y+z.h/2,'#ff4444',4,200,80,2);}}
  });
  zombies=zombies.filter(z=>z.x>-60&&z.x<W+60);

  // Blasts
  blasts.forEach(b=>{b.x+=b.vx*dt;b.life-=dt;});
  blasts=blasts.filter(b=>b.life>0&&b.x>-30&&b.x<W+30);

  // Particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.life-=dt;p.vx*=Math.pow(.97,dt*60);});
  particles=particles.filter(p=>p.life>0);

  // Collisions: coins
  const pr={x:P.x+5,y:P.y+3,w:P.w-10,h:P.h-6};
  coins=coins.filter(c=>{if(hits(pr,c)){score+=c.val;snd('coin');emit(c.x+9,c.y+9,c.val===50?'#00ff66':'#ffd700',8,350,200,2.5);return false;}return true;});

  // Collisions: blasts vs zombies
  blasts.forEach(b=>{const br={x:b.x-14,y:b.y-14,w:28,h:28};
    zombies=zombies.filter(z=>{if(hits(br,z)){z.hp--;if(z.hp<=0){score+=z.type==='big'?35:15;snd('zombiedeath');emit(z.x+z.w/2,z.y+z.h/2,'#4a8a3a',15,400,200,3);emit(z.x+z.w/2,z.y+10,'#661010',8,350,150,2.5);return false;}emit(z.x+z.w/2,z.y+z.h/2,'#88ff44',4,200,80,2);return true;}return true;});});

  // Collisions: player vs zombies
  if(invT<=0){for(const z of zombies){const zr={x:z.x+5,y:z.y+5,w:z.w-10,h:z.h-6};
    if(hits(pr,zr)){lives--;invT=1.5;shakeT=.3;shakeI=10;snd('hit');emit(P.x+P.w/2,P.y+P.h/2,'#ff0000',12,400,150,3);
      if(lives<=0){state='gameover';snd('gameover');}break;}}}
}

// ========== RENDER ==========
function render(){
  X.save();
  if(shakeT>0){const si=shakeI*(shakeT/.3);X.translate((Math.random()-.5)*si,(Math.random()-.5)*si);}
  if(state==='start'){drawStart();}
  else if(state==='playing'){
    drawBG(1/60);coins.forEach(drawCoin);zombies.forEach(drawZombie);drawNinja();blasts.forEach(drawBlast);
    particles.forEach(p=>{const a=Math.min(1,p.life/p.mx*2);X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2|0,p.y-p.sz/2|0,p.sz,p.sz);});
    X.globalAlpha=1;
    const vg=X.createRadialGradient(W/2,H/2,H*.4,W/2,H/2,W*.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.35)');X.fillStyle=vg;X.fillRect(0,0,W,H);
    drawHUD();
  } else {drawBG(1/60);zombies.forEach(drawZombie);drawNinja();drawGameOver();}
  X.restore();
}

// ========== GAME LOOP (delta-time) ==========
let lastTime=0;
const TARGET_DT=1/60,MAX_DT=1/20; // cap to prevent spiral of death
function gameLoop(ts){
  if(!lastTime)lastTime=ts;
  let dt=(ts-lastTime)/1000;
  lastTime=ts;
  if(dt>MAX_DT)dt=MAX_DT; // clamp large gaps
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
