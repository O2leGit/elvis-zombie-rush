<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elvis's Zombie Rush</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; border: 2px solid #2a0845; box-shadow: 0 0 40px rgba(100, 0, 200, 0.3); }
#touch-ui { display:none; position:fixed; bottom:0; left:0; right:0; height:140px; pointer-events:none; z-index:10; }
#touch-ui button { pointer-events:auto; position:absolute; border:none; border-radius:50%; font-weight:bold; font-family:'Courier New',monospace; opacity:0.55; -webkit-tap-highlight-color:transparent; }
#touch-ui button:active { opacity:0.85; transform:scale(1.08); }
#btn-left { bottom:20px; left:16px; width:64px; height:64px; background:rgba(200,200,255,0.2); color:#aac; font-size:28px; border-radius:12px!important; }
#btn-right { bottom:20px; left:90px; width:64px; height:64px; background:rgba(200,200,255,0.2); color:#aac; font-size:28px; border-radius:12px!important; }
#btn-jump { bottom:20px; right:90px; width:72px; height:72px; background:rgba(80,220,120,0.25); color:#6e6; font-size:14px; }
#btn-blast { bottom:20px; right:10px; width:72px; height:72px; background:rgba(0,180,255,0.25); color:#4cf; font-size:13px; }
@media (max-width: 1024px), (pointer: coarse) { #touch-ui { display:block; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touch-ui">
  <button id="btn-left">&larr;</button>
  <button id="btn-right">&rarr;</button>
  <button id="btn-jump">JUMP</button>
  <button id="btn-blast">BLADE</button>
</div>
<script>
const C = document.getElementById('game');
const X = C.getContext('2d');
C.width = 900; C.height = 550;
const W = C.width, H = C.height;

// ---- AUDIO ----
const AC = new (window.AudioContext || window.webkitAudioContext)();
function snd(type) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  const t = AC.currentTime;
  const presets = {
    jump: () => { o.type='triangle'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(440,t+0.12); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18); o.start(t); o.stop(t+0.18); },
    land: () => { o.type='sine'; o.frequency.setValueAtTime(80,t); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1); o.start(t); o.stop(t+0.1); },
    coin: () => {
      o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.06);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(t); o.stop(t+0.12);
      const o2=AC.createOscillator(),g2=AC.createGain(); o2.connect(g2); g2.connect(AC.destination);
      o2.type='sine'; o2.frequency.setValueAtTime(1320,t+0.07); o2.frequency.exponentialRampToValueAtTime(1760,t+0.14);
      g2.gain.setValueAtTime(0.1,t+0.07); g2.gain.exponentialRampToValueAtTime(0.001,t+0.2); o2.start(t+0.07); o2.stop(t+0.2);
    },
    hit: () => {
      o.type='sawtooth'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(40,t+0.25);
      g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3); o.start(t); o.stop(t+0.3);
      // impact noise
      const b=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.25*(1-i/d.length);
      const n=AC.createBufferSource(),ng=AC.createGain(); n.buffer=b; n.connect(ng); ng.connect(AC.destination);
      ng.gain.setValueAtTime(0.15,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.15); n.start(t);
    },
    blast: () => {
      o.type='sawtooth'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(600,t+0.08);
      o.frequency.exponentialRampToValueAtTime(40,t+0.35);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4); o.start(t); o.stop(t+0.4);
      const b=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.35*(1-i/d.length);
      const n=AC.createBufferSource(),ng=AC.createGain(); n.buffer=b; n.connect(ng); ng.connect(AC.destination);
      ng.gain.setValueAtTime(0.12,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.25); n.start(t);
    },
    zombiedeath: () => {
      o.type='square'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(60,t+0.3);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t); o.stop(t+0.35);
    },
    gameover: () => {
      o.type='square'; [400,300,200,150,100].forEach((f,i) => o.frequency.setValueAtTime(f,t+i*0.18));
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.9); o.start(t); o.stop(t+0.9);
    },
    start: () => {
      o.type='square'; [330,440,550,660,880].forEach((f,i) => o.frequency.setValueAtTime(f,t+i*0.08));
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45); o.start(t); o.stop(t+0.45);
    },
    thunder: () => {
      o.type='sawtooth'; o.frequency.setValueAtTime(50,t); o.frequency.setValueAtTime(35,t+0.3);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.8); o.start(t); o.stop(t+0.8);
      const b=AC.createBuffer(1,AC.sampleRate*0.6,AC.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.4*(1-i/d.length)**0.5;
      const n=AC.createBufferSource(),ng=AC.createGain(); n.buffer=b; n.connect(ng); ng.connect(AC.destination);
      ng.gain.setValueAtTime(0.2,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.6); n.start(t);
    },
    step: () => {
      o.type='sine'; o.frequency.setValueAtTime(60+Math.random()*30,t);
      g.gain.setValueAtTime(0.03,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05); o.start(t); o.stop(t+0.05);
    },
    groan: () => {
      o.type='sawtooth'; o.frequency.setValueAtTime(70+Math.random()*30,t);
      o.frequency.exponentialRampToValueAtTime(50,t+0.5);
      g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.start(t); o.stop(t+0.5);
    },
    lunge: () => {
      o.type='square'; o.frequency.setValueAtTime(100,t);
      o.frequency.exponentialRampToValueAtTime(250,t+0.08);
      o.frequency.exponentialRampToValueAtTime(60,t+0.2);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.start(t); o.stop(t+0.2);
    }
  };
  if (presets[type]) presets[type]();
}

// ---- AMBIENT HORROR MUSIC ----
let ambientStarted = false;
let heartbeatInterval = null;
let ambienceInterval = null;

function startAmbient() {
  if (ambientStarted) return;
  ambientStarted = true;

  // Deep horror drone -- continuous low rumble
  const drone = AC.createOscillator();
  const droneGain = AC.createGain();
  const droneFilter = AC.createBiquadFilter();
  drone.type = 'sawtooth';
  drone.frequency.setValueAtTime(38, AC.currentTime);
  droneFilter.type = 'lowpass';
  droneFilter.frequency.setValueAtTime(80, AC.currentTime);
  drone.connect(droneFilter);
  droneFilter.connect(droneGain);
  droneGain.connect(AC.destination);
  droneGain.gain.setValueAtTime(0.06, AC.currentTime);
  drone.start();

  // Second drone layer -- dissonant fifth
  const drone2 = AC.createOscillator();
  const d2g = AC.createGain();
  drone2.type = 'sine';
  drone2.frequency.setValueAtTime(57, AC.currentTime); // dissonant
  drone2.connect(d2g);
  d2g.connect(AC.destination);
  d2g.gain.setValueAtTime(0.035, AC.currentTime);
  drone2.start();

  // Slow LFO to modulate drone pitch for eerie wobble
  const lfo = AC.createOscillator();
  const lfoGain = AC.createGain();
  lfo.type = 'sine';
  lfo.frequency.setValueAtTime(0.15, AC.currentTime);
  lfoGain.gain.setValueAtTime(3, AC.currentTime);
  lfo.connect(lfoGain);
  lfoGain.connect(drone.frequency);
  lfo.start();

  // Wind noise layer
  const windBuf = AC.createBuffer(1, AC.sampleRate * 4, AC.sampleRate);
  const windData = windBuf.getChannelData(0);
  for (let i = 0; i < windData.length; i++) {
    windData[i] = (Math.random() * 2 - 1) * 0.5;
    // shape it to be more gusty
    windData[i] *= 0.3 + 0.7 * Math.sin(i / AC.sampleRate * 0.4) ** 2;
  }
  const wind = AC.createBufferSource();
  const windGain = AC.createGain();
  const windFilter = AC.createBiquadFilter();
  wind.buffer = windBuf;
  wind.loop = true;
  windFilter.type = 'bandpass';
  windFilter.frequency.setValueAtTime(400, AC.currentTime);
  windFilter.Q.setValueAtTime(0.5, AC.currentTime);
  wind.connect(windFilter);
  windFilter.connect(windGain);
  windGain.connect(AC.destination);
  windGain.gain.setValueAtTime(0.04, AC.currentTime);
  wind.start();

  // Heartbeat -- thumps every ~1 second
  heartbeatInterval = setInterval(() => {
    if (state !== 'playing') return;
    const t = AC.currentTime;
    // Double thump like a heartbeat
    for (let i = 0; i < 2; i++) {
      const beat = AC.createOscillator();
      const bg = AC.createGain();
      beat.type = 'sine';
      beat.frequency.setValueAtTime(45, t + i * 0.15);
      beat.frequency.exponentialRampToValueAtTime(30, t + i * 0.15 + 0.1);
      beat.connect(bg);
      bg.connect(AC.destination);
      bg.gain.setValueAtTime(i === 0 ? 0.1 : 0.06, t + i * 0.15);
      bg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.15);
      beat.start(t + i * 0.15);
      beat.stop(t + i * 0.15 + 0.15);
    }
  }, 1200);

  // Random scary sounds -- whispers, distant screams, creaks
  ambienceInterval = setInterval(() => {
    if (state !== 'playing') return;
    const r = Math.random();
    const t = AC.currentTime;
    if (r < 0.3) {
      // Whisper/breath -- filtered noise
      const wb = AC.createBuffer(1, AC.sampleRate * 0.6, AC.sampleRate);
      const wd = wb.getChannelData(0);
      for (let i = 0; i < wd.length; i++) wd[i] = (Math.random() * 2 - 1) * (1 - i / wd.length) * 0.3;
      const ws = AC.createBufferSource();
      const wg = AC.createGain();
      const wf = AC.createBiquadFilter();
      ws.buffer = wb;
      wf.type = 'bandpass';
      wf.frequency.setValueAtTime(2000 + Math.random() * 2000, t);
      wf.Q.setValueAtTime(3, t);
      ws.connect(wf); wf.connect(wg); wg.connect(AC.destination);
      wg.gain.setValueAtTime(0.04, t);
      wg.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      ws.start(t);
    } else if (r < 0.5) {
      // Distant scream -- rising pitch
      const sc = AC.createOscillator();
      const sg = AC.createGain();
      sc.type = 'sawtooth';
      sc.frequency.setValueAtTime(300, t);
      sc.frequency.exponentialRampToValueAtTime(900, t + 0.3);
      sc.frequency.exponentialRampToValueAtTime(200, t + 0.6);
      sc.connect(sg); sg.connect(AC.destination);
      sg.gain.setValueAtTime(0.02, t);
      sg.gain.setValueAtTime(0.04, t + 0.15);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      sc.start(t); sc.stop(t + 0.7);
    } else if (r < 0.7) {
      // Creak sound
      const cr = AC.createOscillator();
      const cg = AC.createGain();
      cr.type = 'triangle';
      cr.frequency.setValueAtTime(200 + Math.random() * 100, t);
      cr.frequency.exponentialRampToValueAtTime(400 + Math.random() * 200, t + 0.2);
      cr.frequency.exponentialRampToValueAtTime(150, t + 0.4);
      cr.connect(cg); cg.connect(AC.destination);
      cg.gain.setValueAtTime(0.025, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      cr.start(t); cr.stop(t + 0.4);
    }
  }, 3000 + Math.random() * 2000);
}

function stopAmbient() {
  // intervals keep running but guard on state !== playing
}

// ---- STATE ----
let state = 'start', score = 0, lives = 3, invTimer = 0, blastCD = 0;
const BLAST_CD_MAX = 50;
let shakeT = 0, shakeI = 0, frame = 0;
let lightningT = 0, lightningI = 0;
let camX = 0; // subtle camera

// ---- PLAYER ----
const P = { x:120, y:0, w:36, h:48, vy:0, vx:0, ground:true, face:1, anim:0, at:0, running:false, wasGround:true };
const GRAV = 0.7, JUMP = -14.5, MSPD = 9, GY = 420;

// ---- ENTITIES ----
let zombies=[], coins=[], blasts=[], particles=[], rain=[], clouds=[], tombstones=[], bats=[];

// ---- INPUT ----
const K = {};
document.addEventListener('keydown', e => {
  K[e.code]=true;
  if(e.code==='Space') e.preventDefault();
  if(state==='start'&&(e.code==='Space'||e.code==='Enter')) go();
  if(state==='gameover'&&(e.code==='Space'||e.code==='Enter')) go();
});
document.addEventListener('keyup', e => K[e.code]=false);
C.addEventListener('click', () => { if(state==='start'||state==='gameover') go(); });

// ---- TOUCH CONTROLS ----
const touch = { left:false, right:false, jump:false, blast:false };
function bindBtn(id, key) {
  const b = document.getElementById(id);
  if(!b) return;
  const on = e => { e.preventDefault(); touch[key]=true; if(state==='start'||state==='gameover') go(); };
  const off = e => { e.preventDefault(); touch[key]=false; };
  b.addEventListener('touchstart', on, {passive:false});
  b.addEventListener('touchend', off, {passive:false});
  b.addEventListener('touchcancel', off, {passive:false});
  b.addEventListener('mousedown', on);
  b.addEventListener('mouseup', off);
  b.addEventListener('mouseleave', off);
}
bindBtn('btn-left','left'); bindBtn('btn-right','right');
bindBtn('btn-jump','jump'); bindBtn('btn-blast','blast');

// Tap canvas to start on mobile
C.addEventListener('touchstart', e => {
  e.preventDefault(); AC.resume();
  if(state==='start'||state==='gameover') go();
}, {passive:false});

// ---- AUTO RESIZE CANVAS ----
function resize() {
  const isMobile = window.innerWidth <= 1024 || 'ontouchstart' in window;
  const pad = isMobile ? 0 : 20;
  const bottomPad = isMobile ? 140 : 0; // room for touch buttons
  const maxW = window.innerWidth - pad*2;
  const maxH = window.innerHeight - pad*2 - bottomPad;
  const scale = Math.min(maxW / W, maxH / H, 1.5);
  C.style.width = (W * scale) + 'px';
  C.style.height = (H * scale) + 'px';
  if(isMobile) {
    C.style.border = 'none';
    C.style.boxShadow = 'none';
  }
}
window.addEventListener('resize', resize);
resize();

// ---- INIT ENVIRONMENT ----
function initEnv() {
  rain = [];
  for (let i=0; i<120; i++) rain.push({ x:Math.random()*W, y:Math.random()*H, s:2+Math.random()*4, sp:4+Math.random()*6, w:Math.random()*0.5+0.3 });
  clouds = [];
  for (let i=0; i<6; i++) clouds.push({ x:Math.random()*W, y:20+Math.random()*80, w:100+Math.random()*150, h:30+Math.random()*40, sp:0.15+Math.random()*0.25 });
  tombstones = [];
  for (let i=0; i<8; i++) tombstones.push({ x:60+i*100+Math.random()*40, h:20+Math.random()*25, w:16+Math.random()*10, tilt:(Math.random()-0.5)*0.15 });
  bats = [];
  for (let i=0; i<5; i++) bats.push({ x:Math.random()*W, y:60+Math.random()*120, sp:1+Math.random()*2, amp:20+Math.random()*30, phase:Math.random()*Math.PI*2, wingT:Math.random()*10 });
}
initEnv();

function go() {
  AC.resume(); snd('start'); startAmbient(); state='playing'; score=0; lives=3; invTimer=0; blastCD=0;
  P.x=120; P.y=GY-P.h; P.vy=0; P.vx=0; P.ground=true;
  zombies=[]; coins=[]; blasts=[]; particles=[]; initEnv();
}

// ---- PARTICLES ----
function emit(x,y,col,n,opts={}) {
  for(let i=0;i<n;i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*(opts.spread||6), vy:(Math.random()-0.5)*(opts.spread||6)-(opts.up||2),
      life:20+Math.random()*(opts.life||30), mx:50, col, sz:1.5+Math.random()*(opts.sz||3),
      grav: opts.grav !== undefined ? opts.grav : 0.1, fade: opts.fade !== undefined ? opts.fade : true
    });
  }
}

// ---- COLLISION ----
function hits(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// ---- SPAWN ----
function spawnZ() {
  const sp = 4.5+Math.min(score/150,7);
  const R = Math.random()>0.3;
  const big = Math.random()>0.7;
  const runner = !big && Math.random()>0.5; // fast runner type -- more common
  const spMul = runner ? 2.0 : (0.8+Math.random()*0.7);
  zombies.push({
    x:R?W+20:-50, y:GY-(big?50:42), w:big?36:30, h:big?50:42,
    vx:R? -sp*spMul : sp*spMul,
    anim:0, type:big?'big':(runner?'runner':'normal'), hp:big?2:1,
    lungeCD: runner ? 60+Math.random()*90 : 0
  });
  // Scary groan sound on spawn
  if (Math.random()>0.5) snd('groan');
}
function spawnC() {
  coins.push({
    x:50+Math.random()*(W-100), y:GY-70-Math.random()*140,
    w:18, h:18, val:Math.random()>0.82?50:10, t:Math.random()*Math.PI*2
  });
}

// ---- DRAWING HELPERS ----
function drawShadow(x, y, w) {
  const g = X.createRadialGradient(x+w/2, GY+2, 0, x+w/2, GY+2, w*0.7);
  g.addColorStop(0, 'rgba(0,0,0,0.35)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  X.fillStyle = g;
  X.beginPath();
  X.ellipse(x+w/2, GY+2, w*0.7, 6, 0, 0, Math.PI*2);
  X.fill();
}

// ---- DRAW BACKGROUND ----
function drawBG() {
  // Sky gradient
  const sg = X.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#050510'); sg.addColorStop(0.3,'#0c0828'); sg.addColorStop(0.6,'#150c3a'); sg.addColorStop(1,'#1a0e45');
  X.fillStyle=sg; X.fillRect(0,0,W,H);

  // Lightning flash
  if (lightningT > 0) {
    X.fillStyle = `rgba(200,180,255,${lightningT * 0.12})`;
    X.fillRect(0,0,W,H);
    lightningT--;
    // Lightning bolt
    if (lightningT > 12) {
      X.strokeStyle = `rgba(255,255,255,${lightningT*0.06})`;
      X.lineWidth = 2;
      X.beginPath();
      let lx = lightningI, ly = 0;
      X.moveTo(lx, ly);
      for (let i=0; i<8; i++) {
        lx += (Math.random()-0.5)*40;
        ly += 30+Math.random()*20;
        X.lineTo(lx, ly);
      }
      X.stroke();
      X.strokeStyle = `rgba(200,180,255,${lightningT*0.03})`;
      X.lineWidth = 6; X.stroke();
    }
  }

  // Stars with proper twinkle
  for (let i=0; i<80; i++) {
    const sx = (i*137.5)%W, sy = (i*97.3)%280;
    const tw = Math.sin(frame*0.03+i*2.1)*0.4+0.6;
    const sz = ((i*3.7)%2)+0.5;
    X.fillStyle = `rgba(255,255,220,${tw*0.7})`;
    X.fillRect(sx, sy, sz, sz);
    if (sz > 1.2) { X.fillStyle = `rgba(255,255,220,${tw*0.15})`; X.fillRect(sx-1,sy-1,sz+2,sz+2); }
  }

  // Moon with glow and craters
  const mx=680, my=65, mr=36;
  // Glow rings
  for (let r=mr+40; r>mr; r-=4) {
    X.fillStyle = `rgba(200,180,140,${0.01*(mr+40-r)})`;
    X.beginPath(); X.arc(mx,my,r,0,Math.PI*2); X.fill();
  }
  X.fillStyle='#e8dcc8'; X.beginPath(); X.arc(mx,my,mr,0,Math.PI*2); X.fill();
  // Crescent shadow
  X.fillStyle='#050510'; X.beginPath(); X.arc(mx+14,my-8,mr-4,0,Math.PI*2); X.fill();
  // Craters on visible part
  X.fillStyle='rgba(0,0,0,0.08)';
  X.beginPath(); X.arc(mx-12,my+5,4,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(mx-6,my-8,3,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(mx-18,my-4,2,0,Math.PI*2); X.fill();

  // Clouds (dark, layered)
  clouds.forEach(c => {
    c.x += c.sp;
    if (c.x > W+100) c.x = -c.w-50;
    X.fillStyle = 'rgba(15,10,30,0.6)';
    X.beginPath();
    X.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2);
    X.ellipse(c.x+c.w*0.3, c.y-c.h*0.2, c.w*0.35, c.h*0.4, 0, 0, Math.PI*2);
    X.ellipse(c.x-c.w*0.25, c.y+c.h*0.1, c.w*0.3, c.h*0.35, 0, 0, Math.PI*2);
    X.fill();
  });

  // Bats
  bats.forEach(b => {
    b.x += b.sp; b.wingT += 0.2;
    if (b.x > W+30) b.x = -30;
    const by = b.y + Math.sin(frame*0.04+b.phase)*b.amp;
    const wing = Math.sin(b.wingT)*6;
    X.fillStyle = '#0a0015';
    X.fillRect(b.x-1, by, 3, 2);
    // Wings
    X.beginPath(); X.moveTo(b.x, by); X.lineTo(b.x-8, by-wing); X.lineTo(b.x-4, by+1); X.fill();
    X.beginPath(); X.moveTo(b.x+2, by); X.lineTo(b.x+10, by-wing); X.lineTo(b.x+6, by+1); X.fill();
  });

  // Distant treeline silhouette
  X.fillStyle = '#080418';
  for (let i=0; i<W; i+=3) {
    const th = 60 + Math.sin(i*0.02)*25 + Math.sin(i*0.05)*15 + Math.sin(i*0.13)*8;
    X.fillRect(i, GY-100-th, 3, th+100);
  }

  // Haunted house (mid-ground)
  const hx = 520;
  X.fillStyle = '#0a0418';
  X.fillRect(hx,GY-180,130,180); // Main
  // Peaked roof
  X.beginPath(); X.moveTo(hx-15,GY-180); X.lineTo(hx+65,GY-240); X.lineTo(hx+145,GY-180); X.fill();
  // Tower
  X.fillRect(hx+45,GY-270,35,90);
  X.beginPath(); X.moveTo(hx+40,GY-270); X.lineTo(hx+62,GY-310); X.lineTo(hx+85,GY-270); X.fill();
  // Chimney
  X.fillRect(hx+110,GY-220,14,40);
  // Windows with flickering light
  const flk1 = 0.4+Math.sin(frame*0.07)*0.15+Math.sin(frame*0.13)*0.1;
  const flk2 = 0.35+Math.sin(frame*0.09+1)*0.12+Math.sin(frame*0.17)*0.08;
  // Window glow halos
  [[hx+25,GY-140,flk1],[hx+75,GY-140,flk2],[hx+50,GY-100,flk1*0.8],[hx+55,GY-285,flk2]].forEach(([wx,wy,f]) => {
    const wg = X.createRadialGradient(wx+8,wy+10,0,wx+8,wy+10,30);
    wg.addColorStop(0,`rgba(255,180,60,${f*0.25})`); wg.addColorStop(1,'rgba(255,180,60,0)');
    X.fillStyle=wg; X.fillRect(wx-20,wy-18,56,56);
    X.fillStyle=`rgba(255,190,80,${f})`; X.fillRect(wx,wy,16,20);
    // Window cross
    X.fillStyle='#0a0418'; X.fillRect(wx+7,wy,2,20); X.fillRect(wx,wy+9,16,2);
  });
  // Door
  X.fillStyle='#060310'; X.fillRect(hx+48,GY-50,30,50);
  X.fillStyle='#1a0a30'; X.beginPath(); X.arc(hx+63,GY-50,15,Math.PI,0); X.fill();

  // Tombstones
  tombstones.forEach(ts => {
    X.save();
    X.translate(ts.x+ts.w/2, GY);
    X.rotate(ts.tilt);
    X.fillStyle='#1a1428';
    X.fillRect(-ts.w/2, -ts.h, ts.w, ts.h);
    // Rounded top
    X.beginPath(); X.arc(0, -ts.h, ts.w/2, Math.PI, 0); X.fill();
    // Cross etching
    X.fillStyle='#120e20';
    X.fillRect(-1, -ts.h+4, 2, 10);
    X.fillRect(-4, -ts.h+7, 8, 2);
    X.restore();
  });

  // Fence
  X.fillStyle='#110a22';
  for(let i=0;i<W;i+=28) {
    X.fillRect(i, GY-28, 3, 28);
    // Pointed tops
    X.beginPath(); X.moveTo(i-1,GY-28); X.lineTo(i+1.5,GY-35); X.lineTo(i+4,GY-28); X.fill();
  }
  X.fillRect(0,GY-18,W,3); X.fillRect(0,GY-8,W,3);

  // Ground with depth
  const gg = X.createLinearGradient(0,GY,0,H);
  gg.addColorStop(0,'#120a25'); gg.addColorStop(0.15,'#0e0820'); gg.addColorStop(0.5,'#0a0618'); gg.addColorStop(1,'#060412');
  X.fillStyle=gg; X.fillRect(0,GY,W,H-GY);
  // Dirt texture
  for(let i=0;i<50;i++) {
    const dx=(i*67.3)%W, dy=GY+2+(i*23.7)%(H-GY-4);
    X.fillStyle=`rgba(40,25,60,${0.3+Math.random()*0.2})`;
    X.fillRect(dx,dy,2+Math.random()*3,1);
  }
  // Grass tufts
  for(let i=0;i<W;i+=8) {
    const gh=3+Math.sin(i*0.4+frame*0.03)*2;
    X.fillStyle='#0e1a0a'; X.fillRect(i,GY-gh,2,gh);
    X.fillStyle='#0a150a'; X.fillRect(i+3,GY-gh+1,1,gh-1);
  }

  // Ground fog (animated)
  for(let i=0;i<8;i++) {
    const fx = (frame*0.4+i*130)%(W+200)-100;
    const fy = GY-5+Math.sin(frame*0.02+i)*4;
    const fg = X.createRadialGradient(fx,fy,0,fx,fy,80);
    fg.addColorStop(0,`rgba(80,60,120,${0.06+Math.sin(frame*0.015+i)*0.02})`);
    fg.addColorStop(1,'rgba(80,60,120,0)');
    X.fillStyle=fg;
    X.beginPath(); X.ellipse(fx,fy,80,15,0,0,Math.PI*2); X.fill();
  }

  // Rain
  X.strokeStyle='rgba(150,140,200,0.25)'; X.lineWidth=0.8;
  rain.forEach(r => {
    r.y += r.sp; r.x -= 1.5;
    if(r.y>H) { r.y=-10; r.x=Math.random()*W; }
    if(r.x<0) r.x=W;
    X.beginPath(); X.moveTo(r.x,r.y); X.lineTo(r.x-1.5,r.y+r.s); X.stroke();
  });
}

// ---- DRAW NINJA ----
function drawNinja() {
  if (invTimer>0 && Math.floor(frame/3)%2===0) return;
  const px=Math.floor(P.x), py=Math.floor(P.y), f=P.face;

  drawShadow(px, py, P.w);

  // Scarf trailing
  const scarfWave = Math.sin(frame*0.12)*4;
  const scarfWave2 = Math.sin(frame*0.15+1)*3;
  X.fillStyle='#cc1122';
  X.fillRect(px+(f>0?6:22), py+4, 2, 10);
  X.fillRect(px+(f>0?4:24)+scarfWave*0.5, py+8, 2, 10);
  X.fillRect(px+(f>0?2:26)+scarfWave, py+12, 2, 8);
  X.fillStyle='#aa0e1a';
  X.fillRect(px+(f>0?1:27)+scarfWave2, py+16, 2, 6);

  // Body
  X.fillStyle='#1a0e30'; X.fillRect(px+10,py+10,16,22);
  // Chest detail
  X.fillStyle='#221640'; X.fillRect(px+12,py+12,12,8);

  // Head
  X.fillStyle='#14082a'; X.fillRect(px+9,py,18,14);
  // Mask slit
  X.fillStyle='#0a0418'; X.fillRect(px+9,py+4,18,5);
  // Eyes
  const eyeBlink = frame%180<3 ? 1 : 4;
  X.fillStyle='#ff2020';
  X.fillRect(px+(f>0?18:10), py+5, 5, eyeBlink);
  // Eye glow
  if (eyeBlink > 1) {
    const eg = X.createRadialGradient(px+(f>0?20:12),py+6,0,px+(f>0?20:12),py+6,8);
    eg.addColorStop(0,'rgba(255,40,40,0.3)'); eg.addColorStop(1,'rgba(255,0,0,0)');
    X.fillStyle=eg; X.fillRect(px+(f>0?14:4),py,14,14);
  }

  // Belt + buckle
  X.fillStyle='#4a1a1a'; X.fillRect(px+10,py+28,16,3);
  X.fillStyle='#c8a820'; X.fillRect(px+15,py+28,6,3);

  // Sword on back
  X.fillStyle='#606070';
  X.fillRect(px+(f>0?5:26), py-8, 3, 30);
  X.fillStyle='#c8a820';
  X.fillRect(px+(f>0?3:24), py+16, 7, 3);
  X.fillStyle='#404050';
  X.fillRect(px+(f>0?4:25), py-10, 5, 4);

  // Arms
  if (blastCD > BLAST_CD_MAX-8) {
    // Blast pose -- arm forward
    X.fillStyle='#14082a';
    X.fillRect(px+(f>0?26:-2), py+12, 12*f, 5);
    // Energy charge at hand
    const cs = 3+Math.sin(frame*0.4)*2;
    const cg = X.createRadialGradient(px+(f>0?38:-2),py+14,0,px+(f>0?38:-2),py+14,cs+6);
    cg.addColorStop(0,'rgba(100,220,255,0.8)'); cg.addColorStop(0.5,'rgba(50,150,255,0.3)'); cg.addColorStop(1,'rgba(0,100,255,0)');
    X.fillStyle=cg;
    X.beginPath(); X.arc(px+(f>0?38:-2),py+14,cs+6,0,Math.PI*2); X.fill();
  } else {
    const armSwing = P.running ? Math.sin(P.anim*0.3)*5 : 0;
    X.fillStyle='#14082a';
    X.fillRect(px+6, py+12+armSwing, 4, 14);
    X.fillRect(px+26, py+12-armSwing, 4, 14);
    // Hands
    X.fillStyle='#2a1a40';
    X.fillRect(px+6, py+24+armSwing, 4, 3);
    X.fillRect(px+26, py+24-armSwing, 4, 3);
  }

  // Legs
  const lOff = P.running ? Math.sin(P.anim*0.25)*6 : 0;
  X.fillStyle='#120828';
  X.fillRect(px+11, py+32, 6, 14+lOff);
  X.fillRect(px+19, py+32, 6, 14-lOff);
  // Feet/shoes
  X.fillStyle='#1a1025';
  X.fillRect(px+10, py+44+lOff, 8, 4);
  X.fillRect(px+18, py+44-lOff, 8, 4);
}

// ---- DRAW ZOMBIE ----
function drawZombie(z) {
  const px=Math.floor(z.x), py=Math.floor(z.y);
  const big = z.type==='big';
  const s = big?1.3:1;

  drawShadow(px, py, z.w);

  // Body
  const runner = z.type==='runner';
  const bc = big ? '#2a4a1a' : runner ? '#2a3a18' : '#3a6a28';
  const dc = big ? '#1e3512' : runner ? '#1a2a10' : '#2a501a';
  X.fillStyle=bc; X.fillRect(px+4*s, py+10*s, 22*s, 22*s);
  // Shirt tatters
  X.fillStyle = big ? '#3a2818' : '#4a3a28';
  X.fillRect(px+4*s, py+10*s, 22*s, 5*s);
  X.fillStyle = dc;
  X.fillRect(px+6*s, py+18*s, 4*s, 8*s); // tear
  X.fillRect(px+18*s, py+20*s, 3*s, 6*s);

  // Head
  X.fillStyle = big ? '#3a5a2a' : '#4a7a38';
  X.fillRect(px+6*s, py, 18*s, 14*s);
  // Brow ridge
  X.fillStyle = dc;
  X.fillRect(px+6*s, py+3*s, 18*s, 2*s);

  // Eyes (glowing, asymmetric -- runners have red eyes)
  const eGlow = Math.sin(frame*0.08)*0.2+0.8;
  const eyeCol = runner ? `rgba(255,40,40,${eGlow})` : `rgba(255,255,0,${eGlow})`;
  const eyeCol2 = runner ? `rgba(255,20,20,${eGlow*0.8})` : `rgba(255,200,0,${eGlow*0.8})`;
  X.fillStyle = eyeCol;
  X.fillRect(px+8*s, py+5*s, 4*s, 3*s);
  X.fillStyle = eyeCol2;
  X.fillRect(px+18*s, py+5*s, 3*s, 4*s);
  // Eye glow halo for runners
  if(runner) {
    const rg=X.createRadialGradient(px+10*s,py+6*s,0,px+10*s,py+6*s,8);
    rg.addColorStop(0,'rgba(255,0,0,0.3)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    X.fillStyle=rg; X.fillRect(px+4*s,py,20*s,14*s);
  }
  // Pupils
  X.fillStyle=runner?'#400':'#220';
  X.fillRect(px+9*s, py+6*s, 2*s, 2*s);
  X.fillRect(px+19*s, py+6*s, 1.5*s, 2*s);

  // Mouth
  X.fillStyle='#1a2a10';
  X.fillRect(px+10*s, py+10*s, 10*s, 3*s);
  // Teeth
  X.fillStyle='#ccc';
  X.fillRect(px+11*s, py+10*s, 2*s, 2*s);
  X.fillRect(px+16*s, py+10*s, 2*s, 2*s);
  X.fillRect(px+14*s, py+11*s, 1.5*s, 2*s);

  // Blood/wounds
  X.fillStyle='rgba(120,10,10,0.6)';
  X.fillRect(px+14*s, py+14*s, 2, 4);
  if(big) { X.fillRect(px+8*s, py+22*s, 3, 5); X.fillRect(px+20*s, py+16*s, 2, 6); }
  if(runner) {
    // Extra blood streaks -- these guys are feral
    X.fillStyle='rgba(150,10,10,0.7)';
    X.fillRect(px+6*s, py+12*s, 2, 8); X.fillRect(px+20*s, py+10*s, 2, 10);
    X.fillRect(px+12*s, py+8*s, 3, 5);
    // Claw marks on chest
    X.fillStyle='rgba(80,5,5,0.5)';
    X.fillRect(px+8*s, py+15*s, 1, 6); X.fillRect(px+10*s, py+14*s, 1, 7); X.fillRect(px+12*s, py+15*s, 1, 6);
  }

  // Arms (reaching, shambling)
  const aw = Math.sin(z.anim*0.12)*4;
  X.fillStyle=bc;
  X.fillRect(px-2*s, py+12*s+aw, 6*s, 5*s);
  X.fillRect(px+24*s, py+14*s-aw, 6*s, 5*s);
  // Bony fingers
  X.fillStyle = '#4a6a38';
  X.fillRect(px-4*s, py+12*s+aw, 3, 2);
  X.fillRect(px-3*s, py+14*s+aw, 2, 2);
  X.fillRect(px+28*s, py+14*s-aw, 3, 2);

  // Legs (shambling gait)
  const lw = Math.sin(z.anim*0.08)*4;
  X.fillStyle=dc;
  X.fillRect(px+7*s, py+30*s, 6*s, 12+lw);
  X.fillRect(px+17*s, py+30*s, 6*s, 12-lw);
  // Feet
  X.fillStyle='#1a2a12';
  X.fillRect(px+6*s, py+40*s+lw, 8*s, 3);
  X.fillRect(px+16*s, py+40*s-lw, 8*s, 3);
}

// ---- DRAW COIN ----
function drawCoin(c) {
  const px=c.x, py=c.y;
  const bob = Math.sin(frame*0.06+c.t)*3;
  const gem = c.val===50;

  // Glow
  const gg = X.createRadialGradient(px+9,py+9+bob,0,px+9,py+9+bob,18);
  gg.addColorStop(0, gem?'rgba(0,255,100,0.2)':'rgba(255,215,0,0.2)');
  gg.addColorStop(1, 'rgba(0,0,0,0)');
  X.fillStyle=gg;
  X.beginPath(); X.arc(px+9,py+9+bob,18,0,Math.PI*2); X.fill();

  if (gem) {
    // Diamond shape
    X.fillStyle='#00dd66';
    X.beginPath(); X.moveTo(px+9,py+bob); X.lineTo(px+18,py+9+bob); X.lineTo(px+9,py+18+bob); X.lineTo(px,py+9+bob); X.closePath(); X.fill();
    X.fillStyle='rgba(255,255,255,0.4)';
    X.beginPath(); X.moveTo(px+9,py+bob); X.lineTo(px+13,py+6+bob); X.lineTo(px+9,py+9+bob); X.lineTo(px+5,py+6+bob); X.closePath(); X.fill();
    X.fillStyle='#50ff90';
    X.fillRect(px+7,py+3+bob,2,2);
  } else {
    // Gold coin with spin illusion
    const spinW = 8+Math.sin(frame*0.08+c.t)*6;
    X.fillStyle='#c8960a';
    X.beginPath(); X.ellipse(px+9,py+9+bob,spinW,9,0,0,Math.PI*2); X.fill();
    X.fillStyle='#f0c030';
    X.beginPath(); X.ellipse(px+9,py+9+bob,spinW*0.75,7,0,0,Math.PI*2); X.fill();
    if (spinW > 5) {
      X.fillStyle='#a07808';
      X.font='bold 10px serif'; X.textAlign='center';
      X.fillText('$',px+9,py+13+bob);
    }
  }
}

// ---- DRAW BLAST ----
function drawBlast(b) {
  const p = b.life/b.mx;
  const sz = 8+(1-p)*8;

  // Outer glow
  const og = X.createRadialGradient(b.x,b.y,0,b.x,b.y,sz+12);
  og.addColorStop(0,`rgba(80,200,255,${p*0.4})`);
  og.addColorStop(0.5,`rgba(30,120,255,${p*0.2})`);
  og.addColorStop(1,'rgba(0,60,255,0)');
  X.fillStyle=og;
  X.beginPath(); X.arc(b.x,b.y,sz+12,0,Math.PI*2); X.fill();

  // Core energy
  X.fillStyle=`rgba(150,230,255,${p*0.9})`;
  X.beginPath(); X.arc(b.x,b.y,sz,0,Math.PI*2); X.fill();
  X.fillStyle=`rgba(255,255,255,${p})`;
  X.beginPath(); X.arc(b.x,b.y,sz*0.35,0,Math.PI*2); X.fill();

  // Trail sparks
  for(let i=1;i<5;i++) {
    const tx=b.x-b.vx*i*2+(Math.random()-0.5)*6;
    const ty=b.y+(Math.random()-0.5)*6;
    X.fillStyle=`rgba(100,200,255,${p*0.3*(1-i*0.2)})`;
    X.fillRect(tx-1.5,ty-1.5,3,3);
  }
}

// ---- HUD ----
function drawHUD() {
  // Score with shadow
  X.fillStyle='rgba(0,0,0,0.5)'; X.font='bold 22px Courier New'; X.textAlign='left';
  X.fillText(`SCORE: ${score}`,22,32);
  X.fillStyle='#ffd700';
  X.fillText(`SCORE: ${score}`,20,30);

  // Hearts
  for(let i=0;i<3;i++) {
    const hx=W-35-i*32, hy=14;
    X.fillStyle = i<lives ? '#ee1144' : '#221828';
    // Pixel heart shape
    [[2,0,4],[8,0,4],[0,2,12],[0,4,12],[1,6,10],[2,8,8],[3,10,6],[4,12,4],[5,14,2]].forEach(([ox,oy,w]) => {
      X.fillRect(hx+ox,hy+oy,w,2);
    });
    if (i<lives) {
      // Heart shine
      X.fillStyle='rgba(255,255,255,0.25)';
      X.fillRect(hx+3,hy+2,3,3);
    }
  }

  // Blast cooldown bar
  const cdPct = blastCD/BLAST_CD_MAX;
  X.fillStyle='rgba(0,0,0,0.4)'; X.fillRect(19,42,82,10);
  X.fillStyle = cdPct>0 ? '#334' : '#00bbee';
  X.fillRect(20,43,(1-cdPct)*80,8);
  if (cdPct<=0) {
    // Ready glow
    X.fillStyle=`rgba(0,200,255,${0.3+Math.sin(frame*0.1)*0.15})`;
    X.fillRect(20,43,80,8);
  }
  X.fillStyle='#889'; X.font='10px Courier New'; X.textAlign='left';
  X.fillText('BLADE [X]',20,65);

  // Level
  const lv = Math.min(Math.floor(score/200)+1,10);
  X.fillStyle='rgba(0,0,0,0.4)'; X.font='bold 13px Courier New'; X.textAlign='right';
  X.fillText(`WAVE ${lv}`,W-18,62);
  X.fillStyle='#a080cc';
  X.fillText(`WAVE ${lv}`,W-20,60);
}

// ---- SCREENS ----
function drawStart() {

}

function drawGameOver() {
  X.fillStyle='rgba(0,0,0,0.8)'; X.fillRect(0,0,W,H);
  // Vignette
  const vg=X.createRadialGradient(W/2,H/2,100,W/2,H/2,W/1.5);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.5)');
  X.fillStyle=vg; X.fillRect(0,0,W,H);

  X.shadowColor='#ff0000'; X.shadowBlur=20;
  X.fillStyle='#ff1818'; X.font='bold 52px Courier New'; X.textAlign='center';
  X.fillText('GAME OVER',W/2,170);
  X.shadowBlur=0;

  X.fillStyle='#ffd700'; X.font='bold 30px Courier New';
  X.fillText(`Score: ${score}`,W/2,230);

  let r='Keep practicing!';
  if(score>=100) r='Not bad!'; if(score>=300) r='Awesome ninja!';
  if(score>=600) r='LEGENDARY!'; if(score>=1000) r='UNSTOPPABLE!!!';
  X.fillStyle='#bb88ee'; X.font='20px Courier New';
  X.fillText(r,W/2,270);

  const p=Math.sin(frame*0.07)*3;
  X.fillStyle='#aa1830'; roundRect(W/2-100,300+p,200,52,8);
  X.fillStyle='#dd2848'; roundRect(W/2-98,302+p,196,48,7);
  X.fillStyle='#fff'; X.font='bold 24px Courier New';
  X.fillText('RESTART',W/2,334+p);
  X.fillStyle='#777'; X.font='13px Courier New';
  X.fillText('Press SPACE or ENTER',W/2,380);
}

function roundRect(x,y,w,h,r) {
  X.beginPath(); X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r); X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h); X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r); X.quadraticCurveTo(x,y,x+r,y); X.closePath(); X.fill();
}

// ---- UPDATE ----
function update() {
  frame++;
  if(state!=='playing') return;

  // Random lightning
  if(Math.random()<0.003) { lightningT=20; lightningI=100+Math.random()*600; snd('thunder'); }

  // Input (keyboard + touch)
  let mv=false;
  if(K.ArrowLeft||K.KeyA||touch.left) { P.vx=-MSPD; P.face=-1; mv=true; }
  else if(K.ArrowRight||K.KeyD||touch.right) { P.vx=MSPD; P.face=1; mv=true; }
  else P.vx*=0.7; // friction
  P.running=mv;

  if((K.Space||K.ArrowUp||K.KeyW||touch.jump)&&P.ground) {
    P.vy=JUMP; P.ground=false; snd('jump');
    emit(P.x+P.w/2,GY,`rgba(60,40,80,0.5)`,4,{spread:3,up:0,sz:2,grav:0.2});
    touch.jump=false; // single fire per tap
  }

  // Blast
  if((K.KeyX||touch.blast)&&blastCD<=0) {
    touch.blast=false; // single fire per tap
    blastCD=BLAST_CD_MAX; snd('blast');
    blasts.push({ x:P.x+(P.face>0?38:-2), y:P.y+20, vx:P.face*22, vy:0, life:45, mx:45 });
    emit(P.x+P.w/2,P.y+20,'#00ccff',10,{spread:4,up:1,sz:2});
  }
  if(blastCD>0) blastCD--;

  // Anim
  if(mv) { P.at++; if(P.at>3){P.anim++;P.at=0;} if(P.anim%6===0&&P.ground) snd('step'); }

  // Physics
  P.vy+=GRAV; P.x+=P.vx; P.y+=P.vy;
  P.wasGround=P.ground;
  if(P.y+P.h>=GY) {
    if(!P.wasGround&&P.vy>3) { snd('land'); emit(P.x+P.w/2,GY,'rgba(60,40,80,0.4)',5,{spread:4,up:0,sz:2,grav:0.15}); }
    P.y=GY-P.h; P.vy=0; P.ground=true;
  }
  P.x=Math.max(0,Math.min(W-P.w,P.x));

  if(invTimer>0) invTimer--;
  if(shakeT>0) shakeT--;

  // Spawn -- faster and more aggressive
  const df=Math.min(score/150,6);
  if(frame%Math.max(20,Math.floor(70-df*8))===0) spawnZ();
  if(frame%Math.max(20,Math.floor(60-df*4))===0) spawnC();

  // Update zombies -- lunge AI for runners
  zombies.forEach(z=>{
    z.x+=z.vx; z.anim++;
    if(z.type==='runner' && z.lungeCD!==undefined) {
      z.lungeCD--;
      const dist=Math.abs(z.x-P.x);
      if(z.lungeCD<=0 && dist<250 && dist>30) {
        z.vx *= 2.8; // massive burst of speed toward player
        z.lungeCD = 100+Math.random()*60;
        snd('lunge');
        emit(z.x+z.w/2,z.y+z.h/2,'#ff4444',4,{spread:3,up:1,sz:2});
      }
    }
  });
  zombies=zombies.filter(z=>z.x>-60&&z.x<W+60);

  // Blasts
  blasts.forEach(b=>{b.x+=b.vx;b.life--;});
  blasts=blasts.filter(b=>b.life>0&&b.x>-30&&b.x<W+30);

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life--;p.vx*=0.97;});
  particles=particles.filter(p=>p.life>0);

  // Collisions: coins
  const pr={x:P.x+5,y:P.y+3,w:P.w-10,h:P.h-6};
  coins=coins.filter(c=>{
    const cr={x:c.x,y:c.y+Math.sin(frame*0.06+c.t)*3,w:c.w,h:c.h};
    if(hits(pr,cr)){
      score+=c.val; snd('coin');
      emit(c.x+9,c.y+9,c.val===50?'#00ff66':'#ffd700',8,{spread:5,up:3,sz:2.5});
      return false;
    } return true;
  });

  // Collisions: blasts vs zombies
  blasts.forEach(b=>{
    const br={x:b.x-12,y:b.y-12,w:24,h:24};
    zombies=zombies.filter(z=>{
      if(hits(br,z)){
        z.hp--;
        if(z.hp<=0) {
          score+=z.type==='big'?35:15; snd('zombiedeath');
          emit(z.x+z.w/2,z.y+z.h/2,'#4a8a3a',15,{spread:6,up:3,sz:3});
          emit(z.x+z.w/2,z.y+z.h/2,'#ffcc00',6,{spread:4,up:4,sz:2});
          // Gore particles
          emit(z.x+z.w/2,z.y+10,'#661010',8,{spread:5,up:2,sz:2.5});
          return false;
        }
        // Knockback on big zombie
        emit(z.x+z.w/2,z.y+z.h/2,'#88ff44',4,{spread:3,up:1,sz:2});
        return true;
      } return true;
    });
  });

  // Collisions: player vs zombies
  if(invTimer<=0) {
    for(const z of zombies) {
      const zr={x:z.x+5,y:z.y+5,w:z.w-10,h:z.h-6};
      if(hits(pr,zr)) {
        lives--; invTimer=100; shakeT=18; shakeI=10;
        snd('hit');
        emit(P.x+P.w/2,P.y+P.h/2,'#ff0000',12,{spread:6,up:2,sz:3});
        if(lives<=0) { state='gameover'; snd('gameover'); }
        break;
      }
    }
  }
}

// ---- RENDER ----
function render() {
  X.save();
  if(shakeT>0) {
    const si=shakeI*(shakeT/18);
    X.translate((Math.random()-0.5)*si,(Math.random()-0.5)*si);
  }

  if(state==='start') { drawStart(); }
  else if(state==='playing') {
    drawBG();
    coins.forEach(drawCoin);
    zombies.forEach(drawZombie);
    drawNinja();
    blasts.forEach(drawBlast);
    // Particles
    particles.forEach(p=>{
      const a=p.life/p.mx;
      X.globalAlpha=p.fade?a:1;
      X.fillStyle=p.col;
      X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    });
    X.globalAlpha=1;
    // Vignette overlay
    const vg=X.createRadialGradient(W/2,H/2,H*0.4,W/2,H/2,W*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.35)');
    X.fillStyle=vg; X.fillRect(0,0,W,H);
    drawHUD();
  } else {
    drawBG();
    zombies.forEach(drawZombie);
    drawNinja();
    drawGameOver();
  }
  X.restore();
  requestAnimationFrame(render);
}

function loop() { update(); render(); }
function tick() { update(); }
// Use RAF for render, separate update tick
(function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); })();
</script>
