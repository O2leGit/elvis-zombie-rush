<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elvis's Zombie Rush</title>
<!-- Chrome-recommended AudioContext autoplay fix (from developer.chrome.com) -->
<script>
(function(){
  const list=[];
  const events=['click','contextmenu','auxclick','dblclick','mousedown','mouseup','pointerup','touchend','keydown','keyup'];
  self.AudioContext=new Proxy(self.AudioContext,{construct(t,a){const r=new t(...a);list.push(r);return r;}});
  function resume(){let ok=0;list.forEach(c=>{if(c.state!=='running')c.resume();else ok++;});if(ok===list.length)events.forEach(e=>document.removeEventListener(e,resume));}
  events.forEach(e=>document.addEventListener(e,resume));
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-touch-callout:none;user-select:none}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace}
canvas{display:block;border:2px solid #2a0845;box-shadow:0 0 40px rgba(100,0,200,.3)}
#touch-ui{display:none;position:fixed;bottom:0;left:0;right:0;height:140px;pointer-events:none;z-index:10}
#touch-ui button{pointer-events:auto;position:absolute;border:none;font-weight:bold;font-family:'Courier New',monospace;opacity:.55;-webkit-tap-highlight-color:transparent}
#touch-ui button:active{opacity:.85;transform:scale(1.08)}
#bl{bottom:20px;left:16px;width:64px;height:64px;background:rgba(200,200,255,.2);color:#aac;font-size:28px;border-radius:12px}
#br{bottom:20px;left:90px;width:64px;height:64px;background:rgba(200,200,255,.2);color:#aac;font-size:28px;border-radius:12px}
#bj{bottom:20px;right:90px;width:72px;height:72px;background:rgba(80,220,120,.25);color:#6e6;font-size:14px;border-radius:50%}
#bb{bottom:20px;right:10px;width:72px;height:72px;background:rgba(0,180,255,.25);color:#4cf;font-size:13px;border-radius:50%}
@media(max-width:1024px),(pointer:coarse){#touch-ui{display:block}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touch-ui"><button id="bl">&larr;</button><button id="br">&rarr;</button><button id="bj">JUMP</button><button id="bb">BLADE</button></div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d');
C.width=900;C.height=550;const W=900,H=550,GY=420;

// ===== AUDIO =====
const AC=new AudioContext();
const MG=AC.createGain();MG.gain.value=1;MG.connect(AC.destination);

function snd(type){
  // Always try to resume on any sound call
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(MG);const t=AC.currentTime;
  switch(type){
    case'jump':o.type='triangle';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(560,t+.1);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.13);o.start(t);o.stop(t+.13);break;
    case'land':o.type='sine';o.frequency.setValueAtTime(90,t);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);break;
    case'coin':o.type='sine';o.frequency.setValueAtTime(950,t);o.frequency.exponentialRampToValueAtTime(1500,t+.04);g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.09);
      {const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(MG);o2.type='sine';o2.frequency.setValueAtTime(1500,t+.05);o2.frequency.exponentialRampToValueAtTime(1900,t+.1);g2.gain.setValueAtTime(.14,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.16);o2.start(t+.05);o2.stop(t+.16);}break;
    case'hit':o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(35,t+.22);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28);nBurst(.18,.2);break;
    case'blast':o.type='sawtooth';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(750,t+.05);o.frequency.exponentialRampToValueAtTime(30,t+.28);g.gain.setValueAtTime(.24,t);g.gain.exponentialRampToValueAtTime(.001,t+.32);o.start(t);o.stop(t+.32);nBurst(.22,.2);break;
    case'zombiedeath':o.type='square';o.frequency.setValueAtTime(550,t);o.frequency.exponentialRampToValueAtTime(45,t+.22);g.gain.setValueAtTime(.16,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28);break;
    case'gameover':[400,260,160,100,60].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.15));o.type='square';g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.75);o.start(t);o.stop(t+.75);break;
    case'start':[380,500,630,780,1000].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.06));o.type='square';g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35);break;
    case'lunge':o.type='square';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(350,t+.05);o.frequency.exponentialRampToValueAtTime(45,t+.12);g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);break;
    case'groan':o.type='sawtooth';o.frequency.setValueAtTime(50+Math.random()*30,t);o.frequency.exponentialRampToValueAtTime(35,t+.5);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);break;
    case'thunder':o.type='sawtooth';o.frequency.setValueAtTime(42,t);o.frequency.setValueAtTime(28,t+.4);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+1);o.start(t);o.stop(t+1);nBurst(.7,.28);break;
    case'step':o.type='sine';o.frequency.setValueAtTime(50+Math.random()*40,t);g.gain.setValueAtTime(.035,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.start(t);o.stop(t+.04);break;
  }
}
function nBurst(dur,vol){const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*vol*(1-i/d.length);const s=AC.createBufferSource(),ng=AC.createGain();s.buffer=b;s.connect(ng);ng.connect(MG);ng.gain.setValueAtTime(vol,AC.currentTime);ng.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);s.start();}

// ===== AMBIENT HORROR (game-loop driven, no setInterval) =====
let ambOn=false;
let droneNode=null,drone2Node=null,windNode=null;
let heartbeatT=0,scareT=0,boomT=0;

function startAmbient(){
  if(ambOn)return;ambOn=true;
  if(AC.state==='suspended')AC.resume();

  // Drone 1: deep sub-bass with LFO
  const dr=AC.createOscillator(),drg=AC.createGain(),drf=AC.createBiquadFilter();
  dr.type='sawtooth';dr.frequency.value=36;drf.type='lowpass';drf.frequency.value=75;
  dr.connect(drf);drf.connect(drg);drg.connect(MG);drg.gain.value=.09;dr.start();
  const lfo=AC.createOscillator(),lfog=AC.createGain();lfo.type='sine';lfo.frequency.value=.13;lfog.gain.value=5;
  lfo.connect(lfog);lfog.connect(dr.frequency);lfo.start();droneNode=dr;

  // Drone 2: tritone dissonance
  const d2=AC.createOscillator(),d2g=AC.createGain();d2.type='sine';d2.frequency.value=51;
  d2.connect(d2g);d2g.connect(MG);d2g.gain.value=.05;d2.start();
  const l2=AC.createOscillator(),l2g=AC.createGain();l2.type='sine';l2.frequency.value=.08;l2g.gain.value=3;
  l2.connect(l2g);l2g.connect(d2.frequency);l2.start();drone2Node=d2;

  // Drone 3: very low rumble
  const d3=AC.createOscillator(),d3g=AC.createGain();d3.type='sine';d3.frequency.value=22;
  d3.connect(d3g);d3g.connect(MG);d3g.gain.value=.06;d3.start();

  // Wind: filtered looping noise with gust LFO
  const wb=AC.createBuffer(1,AC.sampleRate*6,AC.sampleRate),wd=wb.getChannelData(0);
  for(let i=0;i<wd.length;i++)wd[i]=(Math.random()*2-1)*.6*(.25+.75*Math.sin(i/AC.sampleRate*.25)**2);
  const wn=AC.createBufferSource(),wg=AC.createGain(),wf=AC.createBiquadFilter();
  wn.buffer=wb;wn.loop=true;wf.type='bandpass';wf.frequency.value=550;wf.Q.value=.6;
  wn.connect(wf);wf.connect(wg);wg.connect(MG);wg.gain.value=.07;wn.start();
  const wl=AC.createOscillator(),wlg=AC.createGain();wl.type='sine';wl.frequency.value=.18;wlg.gain.value=250;
  wl.connect(wlg);wlg.connect(wf.frequency);wl.start();windNode=wn;

  // Init timers
  heartbeatT=0.5;scareT=2;boomT=6;
}

// Game-loop-driven ambient sounds (called every frame with dt)
function updateAmbient(dt){
  if(!ambOn||state!=='playing')return;
  if(AC.state==='suspended')AC.resume();

  // Heartbeat
  heartbeatT-=dt;
  if(heartbeatT<=0){
    heartbeatT=1.05+Math.random()*.15;
    const t=AC.currentTime;
    for(let i=0;i<2;i++){
      const b=AC.createOscillator(),bg=AC.createGain();b.type='sine';
      b.frequency.setValueAtTime(52,t+i*.13);b.frequency.exponentialRampToValueAtTime(26,t+i*.13+.11);
      b.connect(bg);bg.connect(MG);bg.gain.setValueAtTime(i===0?.14:.08,t+i*.13);bg.gain.exponentialRampToValueAtTime(.001,t+i*.13+.13);
      b.start(t+i*.13);b.stop(t+i*.13+.13);
    }
  }

  // Random scary sound
  scareT-=dt;
  if(scareT<=0){
    scareT=2+Math.random()*3;
    const t=AC.currentTime,r=Math.random();
    if(r<.2){
      // Whisper
      const wb=AC.createBuffer(1,AC.sampleRate*.7,AC.sampleRate),wd=wb.getChannelData(0);
      for(let i=0;i<wd.length;i++)wd[i]=(Math.random()*2-1)*(1-i/wd.length)*.35;
      const ws=AC.createBufferSource(),wg=AC.createGain(),wf=AC.createBiquadFilter();
      ws.buffer=wb;wf.type='bandpass';wf.frequency.value=2200+Math.random()*2500;wf.Q.value=5;
      ws.connect(wf);wf.connect(wg);wg.connect(MG);wg.gain.setValueAtTime(.07,t);wg.gain.exponentialRampToValueAtTime(.001,t+.7);ws.start(t);
    } else if(r<.35){
      // Distant scream
      const sc=AC.createOscillator(),sg=AC.createGain();sc.type='sawtooth';
      sc.frequency.setValueAtTime(280,t);sc.frequency.exponentialRampToValueAtTime(1100,t+.18);sc.frequency.exponentialRampToValueAtTime(150,t+.55);
      sc.connect(sg);sg.connect(MG);sg.gain.setValueAtTime(.02,t);sg.gain.setValueAtTime(.05,t+.08);sg.gain.exponentialRampToValueAtTime(.001,t+.6);
      sc.start(t);sc.stop(t+.6);
    } else if(r<.5){
      // Creak
      const cr=AC.createOscillator(),cg=AC.createGain();cr.type='triangle';
      cr.frequency.setValueAtTime(220+Math.random()*180,t);cr.frequency.exponentialRampToValueAtTime(450+Math.random()*250,t+.12);cr.frequency.exponentialRampToValueAtTime(100,t+.35);
      cr.connect(cg);cg.connect(MG);cg.gain.setValueAtTime(.04,t);cg.gain.exponentialRampToValueAtTime(.001,t+.35);cr.start(t);cr.stop(t+.35);
    } else if(r<.65){
      // Low growl
      const gr=AC.createOscillator(),gg=AC.createGain(),gf=AC.createBiquadFilter();
      gr.type='sawtooth';gr.frequency.setValueAtTime(55+Math.random()*25,t);gf.type='lowpass';gf.frequency.value=110;
      gr.connect(gf);gf.connect(gg);gg.connect(MG);gg.gain.setValueAtTime(.1,t);gg.gain.exponentialRampToValueAtTime(.001,t+.7);
      gr.start(t);gr.stop(t+.7);
    } else if(r<.78){
      // Chains
      for(let i=0;i<6;i++){
        const nb=AC.createBuffer(1,AC.sampleRate*.025,AC.sampleRate),nd=nb.getChannelData(0);
        for(let j=0;j<nd.length;j++)nd[j]=(Math.random()*2-1)*.5;
        const ns=AC.createBufferSource(),ng=AC.createGain(),nf=AC.createBiquadFilter();
        ns.buffer=nb;nf.type='highpass';nf.frequency.value=3500;
        ns.connect(nf);nf.connect(ng);ng.connect(MG);ng.gain.setValueAtTime(.05,t+i*.05);ng.gain.exponentialRampToValueAtTime(.001,t+i*.05+.04);ns.start(t+i*.05);
      }
    } else {
      // Eerie high-pitched tone
      const ee=AC.createOscillator(),eg=AC.createGain();ee.type='sine';
      ee.frequency.setValueAtTime(1800+Math.random()*800,t);ee.frequency.exponentialRampToValueAtTime(800,t+.8);
      ee.connect(eg);eg.connect(MG);eg.gain.setValueAtTime(.02,t);eg.gain.setValueAtTime(.035,t+.2);eg.gain.exponentialRampToValueAtTime(.001,t+.8);
      ee.start(t);ee.stop(t+.8);
    }
  }

  // Deep boom
  boomT-=dt;
  if(boomT<=0){
    boomT=7+Math.random()*5;
    const t=AC.currentTime;
    const bm=AC.createOscillator(),bg=AC.createGain();bm.type='sine';
    bm.frequency.setValueAtTime(38,t);bm.frequency.exponentialRampToValueAtTime(14,t+1);
    bm.connect(bg);bg.connect(MG);bg.gain.setValueAtTime(.12,t);bg.gain.exponentialRampToValueAtTime(.001,t+1.2);
    bm.start(t);bm.stop(t+1.2);nBurst(.35,.1);
  }
}

// ===== STATE =====
let state='start',score=0,lives=3,invT=0,blastCD=0,frame=0;
const BLAST_CD=.7;
let shakeT=0,shakeI=0,lightT=0,lightX=0;

// ===== PHYSICS (px/sec) -- FAST =====
const GRAVITY=2200,JUMP_V=-820,MSPD=520,FRIC=.82;

// ===== PLAYER =====
const P={x:120,y:GY-48,w:36,h:48,vy:0,vx:0,gnd:true,face:1,anim:0,run:false,wasGnd:true};

// ===== ENTITIES =====
let zombies=[],coins=[],blasts=[],particles=[],rain=[],clouds=[],tombs=[],bats=[];

// ===== INPUT =====
const K={},T={left:false,right:false,jump:false,blast:false};
document.addEventListener('keydown',e=>{K[e.code]=true;if(e.code==='Space')e.preventDefault();if(state!=='playing')go();});
document.addEventListener('keyup',e=>{K[e.code]=false;});
C.addEventListener('click',()=>{if(state!=='playing')go();});
C.addEventListener('touchstart',e=>{e.preventDefault();AC.resume();if(state!=='playing')go();},{passive:false});
function bindB(id,key){const b=document.getElementById(id);if(!b)return;
  const on=e=>{e.preventDefault();T[key]=true;if(state!=='playing')go();};
  const off=e=>{e.preventDefault();T[key]=false;};
  b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('touchcancel',off,{passive:false});b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);
}
bindB('bl','left');bindB('br','right');bindB('bj','jump');bindB('bb','blast');

// ===== RESIZE =====
function resize(){const mob=window.innerWidth<=1024||'ontouchstart'in window,pad=mob?0:20,bp=mob?140:0;
  const s=Math.min((window.innerWidth-pad*2)/W,(window.innerHeight-pad*2-bp)/H,1.5);
  C.style.width=(W*s)+'px';C.style.height=(H*s)+'px';if(mob){C.style.border='none';C.style.boxShadow='none';}}
window.addEventListener('resize',resize);resize();

// ===== ENVIRONMENT =====
function initEnv(){
  rain=[];for(let i=0;i<150;i++)rain.push({x:Math.random()*W,y:Math.random()*H,s:3+Math.random()*5,sp:600+Math.random()*500});
  clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W,y:12+Math.random()*80,w:100+Math.random()*150,h:22+Math.random()*40,sp:15+Math.random()*25});
  tombs=[];for(let i=0;i<8;i++)tombs.push({x:55+i*105+Math.random()*40,h:18+Math.random()*25,w:14+Math.random()*10,tilt:(Math.random()-.5)*.15});
  bats=[];for(let i=0;i<7;i++)bats.push({x:Math.random()*W,y:45+Math.random()*140,sp:70+Math.random()*120,amp:15+Math.random()*30,ph:Math.random()*6.28,wt:Math.random()*10});
}
initEnv();

function go(){AC.resume();snd('start');startAmbient();state='playing';score=0;lives=3;invT=0;blastCD=0;
  P.x=120;P.y=GY-P.h;P.vy=0;P.vx=0;P.gnd=true;zombies=[];coins=[];blasts=[];particles=[];initEnv();
  spawnZT=.5;spawnCT=.3;heartbeatT=.5;scareT=1.5;boomT=5;}

// ===== PARTICLES =====
function emit(x,y,col,n,sp,up,sz){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*(sp||500),vy:(Math.random()-.5)*(sp||500)-(up||180),life:.35+Math.random()*.45,mx:.8,col,sz:1.5+Math.random()*(sz||3),grav:700});}

function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ===== SPAWN (px/sec) =====
let spawnZT=.5,spawnCT=.3;
function spawnZ(){
  const sp=360+Math.min(score/2.5,500);
  const R=Math.random()>.3,big=Math.random()>.68,runner=!big&&Math.random()>.4;
  const mul=runner?2.2:(.7+Math.random()*.65);
  zombies.push({x:R?W+20:-50,y:GY-(big?50:42),w:big?36:30,h:big?50:42,
    vx:R?-sp*mul:sp*mul,anim:0,type:big?'big':(runner?'runner':'normal'),
    hp:big?2:1,lungeCD:runner?.8+Math.random()*1.2:0});
  if(Math.random()>.35)snd('groan');
}
function spawnC(){coins.push({x:40+Math.random()*(W-80),y:GY-70-Math.random()*150,w:18,h:18,val:Math.random()>.78?50:10,t:Math.random()*6.28});}

// ===== DRAW HELPERS =====
function shad(x,y,w){const g=X.createRadialGradient(x+w/2,GY+2,0,x+w/2,GY+2,w*.7);g.addColorStop(0,'rgba(0,0,0,.35)');g.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=g;X.beginPath();X.ellipse(x+w/2,GY+2,w*.7,6,0,0,6.28);X.fill();}
function rRect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath();X.fill();}

// ===== BACKGROUND =====
function drawBG(dt){
  const sg=X.createLinearGradient(0,0,0,GY);sg.addColorStop(0,'#050510');sg.addColorStop(.3,'#0c0828');sg.addColorStop(.6,'#150c3a');sg.addColorStop(1,'#1a0e45');
  X.fillStyle=sg;X.fillRect(0,0,W,H);
  if(lightT>0){X.fillStyle=`rgba(200,180,255,${lightT*.15})`;X.fillRect(0,0,W,H);
    if(lightT>.7){X.strokeStyle=`rgba(255,255,255,${lightT*.08})`;X.lineWidth=2;X.beginPath();let lx=lightX,ly=0;X.moveTo(lx,ly);for(let i=0;i<8;i++){lx+=(Math.random()-.5)*40;ly+=25+Math.random()*20;X.lineTo(lx,ly);}X.stroke();X.lineWidth=6;X.strokeStyle=`rgba(200,180,255,${lightT*.03})`;X.stroke();}
    lightT-=dt*1.5;if(lightT<0)lightT=0;}
  for(let i=0;i<80;i++){const sx=(i*137.5)%W,sy=(i*97.3)%280,tw=Math.sin(frame*.03+i*2.1)*.4+.6,sz=((i*3.7)%2)+.5;X.fillStyle=`rgba(255,255,220,${tw*.7})`;X.fillRect(sx|0,sy|0,sz,sz);}
  const mx=680,my=65,mr=36;for(let r=mr+40;r>mr;r-=4){X.fillStyle=`rgba(200,180,140,${.01*(mr+40-r)})`;X.beginPath();X.arc(mx,my,r,0,6.28);X.fill();}
  X.fillStyle='#e8dcc8';X.beginPath();X.arc(mx,my,mr,0,6.28);X.fill();X.fillStyle='#050510';X.beginPath();X.arc(mx+14,my-8,mr-4,0,6.28);X.fill();
  clouds.forEach(c=>{c.x+=c.sp*dt;if(c.x>W+100)c.x=-c.w-50;X.fillStyle='rgba(15,10,30,.6)';X.beginPath();X.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,6.28);X.ellipse(c.x+c.w*.3,c.y-c.h*.2,c.w*.35,c.h*.4,0,0,6.28);X.fill();});
  bats.forEach(b=>{b.x+=b.sp*dt;b.wt+=dt*8;if(b.x>W+30)b.x=-30;const by=b.y+Math.sin(frame*.04+b.ph)*b.amp,wing=Math.sin(b.wt)*6;X.fillStyle='#0a0015';X.fillRect(b.x-1|0,by|0,3,2);X.beginPath();X.moveTo(b.x,by);X.lineTo(b.x-8,by-wing);X.lineTo(b.x-4,by+1);X.fill();X.beginPath();X.moveTo(b.x+2,by);X.lineTo(b.x+10,by-wing);X.lineTo(b.x+6,by+1);X.fill();});
  X.fillStyle='#080418';for(let i=0;i<W;i+=3){const th=60+Math.sin(i*.02)*25+Math.sin(i*.05)*15+Math.sin(i*.13)*8;X.fillRect(i,GY-100-th,3,th+100);}
  const hx=520;X.fillStyle='#0a0418';X.fillRect(hx,GY-180,130,180);X.beginPath();X.moveTo(hx-15,GY-180);X.lineTo(hx+65,GY-240);X.lineTo(hx+145,GY-180);X.fill();X.fillRect(hx+45,GY-270,35,90);X.beginPath();X.moveTo(hx+40,GY-270);X.lineTo(hx+62,GY-310);X.lineTo(hx+85,GY-270);X.fill();X.fillRect(hx+110,GY-220,14,40);
  const f1=.4+Math.sin(frame*.07)*.15,f2=.35+Math.sin(frame*.09+1)*.12;
  [[hx+25,GY-140,f1],[hx+75,GY-140,f2],[hx+50,GY-100,f1*.8],[hx+55,GY-285,f2]].forEach(([wx,wy,f])=>{const wg=X.createRadialGradient(wx+8,wy+10,0,wx+8,wy+10,30);wg.addColorStop(0,`rgba(255,180,60,${f*.25})`);wg.addColorStop(1,'rgba(255,180,60,0)');X.fillStyle=wg;X.fillRect(wx-20,wy-18,56,56);X.fillStyle=`rgba(255,190,80,${f})`;X.fillRect(wx,wy,16,20);X.fillStyle='#0a0418';X.fillRect(wx+7,wy,2,20);X.fillRect(wx,wy+9,16,2);});
  X.fillStyle='#060310';X.fillRect(hx+48,GY-50,30,50);
  tombs.forEach(ts=>{X.save();X.translate(ts.x+ts.w/2,GY);X.rotate(ts.tilt);X.fillStyle='#1a1428';X.fillRect(-ts.w/2,-ts.h,ts.w,ts.h);X.beginPath();X.arc(0,-ts.h,ts.w/2,Math.PI,0);X.fill();X.fillStyle='#120e20';X.fillRect(-1,-ts.h+4,2,10);X.fillRect(-4,-ts.h+7,8,2);X.restore();});
  X.fillStyle='#110a22';for(let i=0;i<W;i+=28){X.fillRect(i,GY-28,3,28);X.beginPath();X.moveTo(i-1,GY-28);X.lineTo(i+1.5,GY-35);X.lineTo(i+4,GY-28);X.fill();}X.fillRect(0,GY-18,W,3);X.fillRect(0,GY-8,W,3);
  const gg=X.createLinearGradient(0,GY,0,H);gg.addColorStop(0,'#120a25');gg.addColorStop(.5,'#0a0618');gg.addColorStop(1,'#060412');X.fillStyle=gg;X.fillRect(0,GY,W,H-GY);
  for(let i=0;i<W;i+=8){const gh=3+Math.sin(i*.4+frame*.03)*2;X.fillStyle='#0e1a0a';X.fillRect(i,GY-gh,2,gh);}
  for(let i=0;i<8;i++){const fx=(frame*.4+i*130)%(W+200)-100,fy=GY-5+Math.sin(frame*.02+i)*4;const fg=X.createRadialGradient(fx,fy,0,fx,fy,80);fg.addColorStop(0,`rgba(80,60,120,${.06+Math.sin(frame*.015+i)*.02})`);fg.addColorStop(1,'rgba(80,60,120,0)');X.fillStyle=fg;X.beginPath();X.ellipse(fx,fy,80,15,0,0,6.28);X.fill();}
  X.strokeStyle='rgba(150,140,200,.3)';X.lineWidth=.8;rain.forEach(r=>{r.y+=r.sp*dt;r.x-=100*dt;if(r.y>H){r.y=-10;r.x=Math.random()*W;}if(r.x<0)r.x=W;X.beginPath();X.moveTo(r.x|0,r.y|0);X.lineTo((r.x-1.5)|0,(r.y+r.s)|0);X.stroke();});
}

// ===== DRAW NINJA =====
function drawN(){
  if(invT>0&&Math.floor(frame/3)%2===0)return;
  const px=P.x|0,py=P.y|0,f=P.face;shad(px,py,P.w);
  const sw=Math.sin(frame*.12)*4;X.fillStyle='#cc1122';X.fillRect(px+(f>0?6:22),py+4,2,10);X.fillRect(px+(f>0?4:24)+sw*.5,py+8,2,10);X.fillRect(px+(f>0?2:26)+sw,py+12,2,8);
  X.fillStyle='#1a0e30';X.fillRect(px+10,py+10,16,22);X.fillStyle='#14082a';X.fillRect(px+9,py,18,14);X.fillStyle='#0a0418';X.fillRect(px+9,py+4,18,5);
  const blink=frame%180<3?1:4;X.fillStyle='#ff2020';X.fillRect(px+(f>0?18:10),py+5,5,blink);
  if(blink>1){const eg=X.createRadialGradient(px+(f>0?20:12),py+6,0,px+(f>0?20:12),py+6,8);eg.addColorStop(0,'rgba(255,40,40,.3)');eg.addColorStop(1,'rgba(255,0,0,0)');X.fillStyle=eg;X.fillRect(px+(f>0?14:4),py,14,14);}
  X.fillStyle='#4a1a1a';X.fillRect(px+10,py+28,16,3);X.fillStyle='#c8a820';X.fillRect(px+15,py+28,6,3);
  X.fillStyle='#606070';X.fillRect(px+(f>0?5:26),py-8,3,30);X.fillStyle='#c8a820';X.fillRect(px+(f>0?3:24),py+16,7,3);
  if(blastCD>.5){X.fillStyle='#14082a';X.fillRect(px+(f>0?26:-2),py+12,12*f,5);
    const cs=3+Math.sin(frame*.4)*2,cg=X.createRadialGradient(px+(f>0?38:-2),py+14,0,px+(f>0?38:-2),py+14,cs+6);cg.addColorStop(0,'rgba(100,220,255,.8)');cg.addColorStop(.5,'rgba(50,150,255,.3)');cg.addColorStop(1,'rgba(0,100,255,0)');X.fillStyle=cg;X.beginPath();X.arc(px+(f>0?38:-2),py+14,cs+6,0,6.28);X.fill();
  } else {const as=P.run?Math.sin(P.anim*.3)*5:0;X.fillStyle='#14082a';X.fillRect(px+6,py+12+as,4,14);X.fillRect(px+26,py+12-as,4,14);}
  const lo=P.run?Math.sin(P.anim*.25)*6:0;X.fillStyle='#120828';X.fillRect(px+11,py+32,6,14+lo);X.fillRect(px+19,py+32,6,14-lo);X.fillStyle='#1a1025';X.fillRect(px+10,py+44+lo,8,4);X.fillRect(px+18,py+44-lo,8,4);
}

// ===== DRAW ZOMBIE =====
function drawZ(z){
  const px=z.x|0,py=z.y|0,big=z.type==='big',runner=z.type==='runner',s=big?1.3:1;shad(px,py,z.w);
  const bc=big?'#2a4a1a':runner?'#2a3a18':'#3a6a28',dc=big?'#1e3512':runner?'#1a2a10':'#2a501a';
  X.fillStyle=bc;X.fillRect(px+4*s,py+10*s,22*s,22*s);X.fillStyle=big?'#3a2818':runner?'#2a1a10':'#4a3a28';X.fillRect(px+4*s,py+10*s,22*s,5*s);
  X.fillStyle=big?'#3a5a2a':runner?'#2a4a1a':'#4a7a38';X.fillRect(px+6*s,py,18*s,14*s);X.fillStyle=dc;X.fillRect(px+6*s,py+3*s,18*s,2*s);
  const eG=Math.sin(frame*.08)*.2+.8,eC=runner?`rgba(255,40,40,${eG})`:`rgba(255,255,0,${eG})`;
  X.fillStyle=eC;X.fillRect(px+8*s,py+5*s,4*s,3*s);X.fillRect(px+18*s,py+5*s,3*s,4*s);
  if(runner){const rg=X.createRadialGradient(px+10*s,py+6*s,0,px+10*s,py+6*s,8);rg.addColorStop(0,'rgba(255,0,0,.3)');rg.addColorStop(1,'rgba(255,0,0,0)');X.fillStyle=rg;X.fillRect(px+4*s,py,20*s,14*s);}
  X.fillStyle=runner?'#400':'#220';X.fillRect(px+9*s,py+6*s,2*s,2*s);X.fillRect(px+19*s,py+6*s,1.5*s,2*s);
  X.fillStyle='#1a2a10';X.fillRect(px+10*s,py+10*s,10*s,3*s);X.fillStyle='#ccc';X.fillRect(px+11*s,py+10*s,2*s,2*s);X.fillRect(px+16*s,py+10*s,2*s,2*s);
  X.fillStyle='rgba(120,10,10,.6)';X.fillRect(px+14*s,py+14*s,2,4);if(big){X.fillRect(px+8*s,py+22*s,3,5);}
  if(runner){X.fillStyle='rgba(150,10,10,.7)';X.fillRect(px+6*s,py+12*s,2,8);X.fillRect(px+20*s,py+10*s,2,10);X.fillRect(px+12*s,py+8*s,3,5);}
  const aw=Math.sin(z.anim*.12)*4;X.fillStyle=bc;X.fillRect(px-2*s,py+12*s+aw,6*s,5*s);X.fillRect(px+24*s,py+14*s-aw,6*s,5*s);
  const lw=Math.sin(z.anim*.08)*4;X.fillStyle=dc;X.fillRect(px+7*s,py+30*s,6*s,12+lw);X.fillRect(px+17*s,py+30*s,6*s,12-lw);
}

// ===== DRAW COIN =====
function drawCoin(c){
  const px=c.x,py=c.y,bob=Math.sin(frame*.06+c.t)*3,gem=c.val===50;
  const gg=X.createRadialGradient(px+9,py+9+bob,0,px+9,py+9+bob,18);gg.addColorStop(0,gem?'rgba(0,255,100,.2)':'rgba(255,215,0,.2)');gg.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=gg;X.beginPath();X.arc(px+9,py+9+bob,18,0,6.28);X.fill();
  if(gem){X.fillStyle='#00dd66';X.beginPath();X.moveTo(px+9,py+bob);X.lineTo(px+18,py+9+bob);X.lineTo(px+9,py+18+bob);X.lineTo(px,py+9+bob);X.closePath();X.fill();
  } else {const sw=8+Math.sin(frame*.08+c.t)*6;X.fillStyle='#c8960a';X.beginPath();X.ellipse(px+9,py+9+bob,sw,9,0,0,6.28);X.fill();X.fillStyle='#f0c030';X.beginPath();X.ellipse(px+9,py+9+bob,sw*.75,7,0,0,6.28);X.fill();if(sw>5){X.fillStyle='#a07808';X.font='bold 10px serif';X.textAlign='center';X.fillText('$',px+9,py+13+bob);}}
}

// ===== DRAW BLAST =====
function drawB(b){const p=b.life/b.mx,sz=8+(1-p)*8;const og=X.createRadialGradient(b.x,b.y,0,b.x,b.y,sz+12);og.addColorStop(0,`rgba(80,200,255,${p*.4})`);og.addColorStop(.5,`rgba(30,120,255,${p*.2})`);og.addColorStop(1,'rgba(0,60,255,0)');X.fillStyle=og;X.beginPath();X.arc(b.x,b.y,sz+12,0,6.28);X.fill();X.fillStyle=`rgba(150,230,255,${p*.9})`;X.beginPath();X.arc(b.x,b.y,sz,0,6.28);X.fill();X.fillStyle=`rgba(255,255,255,${p})`;X.beginPath();X.arc(b.x,b.y,sz*.35,0,6.28);X.fill();}

// ===== HUD =====
function drawHUD(){
  X.fillStyle='rgba(0,0,0,.5)';X.font='bold 22px Courier New';X.textAlign='left';X.fillText(`SCORE: ${score}`,22,32);X.fillStyle='#ffd700';X.fillText(`SCORE: ${score}`,20,30);
  for(let i=0;i<3;i++){const hx=W-35-i*32,hy=14;X.fillStyle=i<lives?'#ee1144':'#221828';[[2,0,4],[8,0,4],[0,2,12],[0,4,12],[1,6,10],[2,8,8],[3,10,6],[4,12,4],[5,14,2]].forEach(([ox,oy,w])=>{X.fillRect(hx+ox,hy+oy,w,2);});if(i<lives){X.fillStyle='rgba(255,255,255,.25)';X.fillRect(hx+3,hy+2,3,3);}}
  const cdP=blastCD/BLAST_CD;X.fillStyle='rgba(0,0,0,.4)';X.fillRect(19,42,82,10);X.fillStyle=cdP>0?'#334':'#00bbee';X.fillRect(20,43,(1-cdP)*80,8);
  if(cdP<=0){X.fillStyle=`rgba(0,200,255,${.3+Math.sin(frame*.1)*.15})`;X.fillRect(20,43,80,8);}
  X.fillStyle='#889';X.font='10px Courier New';X.textAlign='left';X.fillText('BLADE [X]',20,65);
  const lv=Math.min(Math.floor(score/200)+1,10);X.fillStyle='#a080cc';X.font='bold 13px Courier New';X.textAlign='right';X.fillText(`WAVE ${lv}`,W-20,60);
}

// ===== SCREENS =====
function drawStart(){
  drawBG(1/60);X.fillStyle='rgba(0,0,0,.65)';X.fillRect(0,0,W,H);
  const g=Math.sin(frame*.04)*.4+.6;X.shadowColor='#ff2020';X.shadowBlur=25*g;
  X.fillStyle='#ff2828';X.font='bold 52px Courier New';X.textAlign='center';X.fillText("ELVIS'S",W/2,120);X.shadowBlur=0;
  X.shadowColor='#ff2020';X.shadowBlur=25*g;X.fillStyle='#ffd700';X.font='bold 56px Courier New';X.fillText('ZOMBIE RUSH',W/2,170);X.shadowBlur=0;
  const oldP={x:P.x,y:P.y,face:P.face};P.x=W/2-18;P.y=200;P.face=1;drawN();P.x=oldP.x;P.y=oldP.y;P.face=oldP.face;
  X.fillStyle='#bbb';X.font='15px Courier New';X.fillText('Arrow Keys / WASD -- Move',W/2,290);X.fillText('SPACE -- Jump',W/2,312);X.fillText('X -- Sword Blast Attack!',W/2,334);X.fillText('Collect money, slay zombies!',W/2,360);
  const p=Math.sin(frame*.07)*4;X.fillStyle='#1a8a3a';rRect(W/2-85,390+p,170,52,8);X.fillStyle='#22bb44';rRect(W/2-83,392+p,166,48,7);X.fillStyle='#fff';X.font='bold 26px Courier New';X.fillText('PLAY!',W/2,424+p);
}
function drawGO(){
  X.fillStyle='rgba(0,0,0,.8)';X.fillRect(0,0,W,H);
  X.shadowColor='#ff0000';X.shadowBlur=20;X.fillStyle='#ff1818';X.font='bold 52px Courier New';X.textAlign='center';X.fillText('GAME OVER',W/2,170);X.shadowBlur=0;
  X.fillStyle='#ffd700';X.font='bold 30px Courier New';X.fillText(`Score: ${score}`,W/2,230);
  let r='Keep practicing!';if(score>=100)r='Not bad!';if(score>=300)r='Awesome ninja!';if(score>=600)r='LEGENDARY!';if(score>=1000)r='UNSTOPPABLE!!!';
  X.fillStyle='#bb88ee';X.font='20px Courier New';X.fillText(r,W/2,270);
  const p=Math.sin(frame*.07)*3;X.fillStyle='#aa1830';rRect(W/2-100,300+p,200,52,8);X.fillStyle='#dd2848';rRect(W/2-98,302+p,196,48,7);X.fillStyle='#fff';X.font='bold 24px Courier New';X.fillText('RESTART',W/2,334+p);X.fillStyle='#777';X.font='13px Courier New';X.fillText('Press SPACE or ENTER',W/2,380);
}

// ===== UPDATE =====
function update(dt){
  frame++;if(state!=='playing')return;

  // Ambient audio (game-loop driven)
  updateAmbient(dt);

  if(Math.random()<.004){lightT=1.2;lightX=100+Math.random()*600;snd('thunder');}

  let mv=false;
  if(K.ArrowLeft||K.KeyA||T.left){P.vx=-MSPD;P.face=-1;mv=true;}
  else if(K.ArrowRight||K.KeyD||T.right){P.vx=MSPD;P.face=1;mv=true;}
  else P.vx*=Math.pow(FRIC,dt*60);
  P.run=mv;

  if((K.Space||K.ArrowUp||K.KeyW||T.jump)&&P.gnd){P.vy=JUMP_V;P.gnd=false;snd('jump');emit(P.x+P.w/2,GY,'rgba(60,40,80,.5)',4,250,0,2);T.jump=false;}

  if((K.KeyX||T.blast)&&blastCD<=0){blastCD=BLAST_CD;snd('blast');
    blasts.push({x:P.x+(P.face>0?38:-2),y:P.y+20,vx:P.face*1500,vy:0,life:.6,mx:.6});
    emit(P.x+P.w/2,P.y+20,'#00ccff',10,350,100,2);T.blast=false;}
  if(blastCD>0)blastCD-=dt;if(blastCD<0)blastCD=0;

  if(mv){P.anim+=dt*14;if(Math.floor(P.anim)%6===0&&P.gnd&&Math.random()<.3)snd('step');}

  P.vy+=GRAVITY*dt;P.x+=P.vx*dt;P.y+=P.vy*dt;
  P.wasGnd=P.gnd;
  if(P.y+P.h>=GY){if(!P.wasGnd&&P.vy>250){snd('land');emit(P.x+P.w/2,GY,'rgba(60,40,80,.4)',5,300,0,2);}P.y=GY-P.h;P.vy=0;P.gnd=true;}
  P.x=Math.max(0,Math.min(W-P.w,P.x));

  if(invT>0)invT-=dt;if(invT<0)invT=0;
  if(shakeT>0)shakeT-=dt;if(shakeT<0)shakeT=0;

  const df=Math.min(score/120,7);
  const zRate=Math.max(.25,1-df*.1);
  const cRate=Math.max(.2,.85-df*.07);
  spawnZT-=dt;if(spawnZT<=0){spawnZ();spawnZT=zRate;}
  spawnCT-=dt;if(spawnCT<=0){spawnC();spawnCT=cRate;}

  zombies.forEach(z=>{z.x+=z.vx*dt;z.anim+=dt*8;
    if(z.type==='runner'&&z.lungeCD!==undefined){z.lungeCD-=dt;const dist=Math.abs(z.x-P.x);
      if(z.lungeCD<=0&&dist<300&&dist>30){z.vx*=2.8;z.lungeCD=1.2+Math.random();snd('lunge');emit(z.x+z.w/2,z.y+z.h/2,'#ff4444',4,250,100,2);}}});
  zombies=zombies.filter(z=>z.x>-60&&z.x<W+60);

  blasts.forEach(b=>{b.x+=b.vx*dt;b.life-=dt;});
  blasts=blasts.filter(b=>b.life>0&&b.x>-30&&b.x<W+30);

  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.life-=dt;p.vx*=Math.pow(.97,dt*60);});
  particles=particles.filter(p=>p.life>0);

  const pr={x:P.x+5,y:P.y+3,w:P.w-10,h:P.h-6};
  coins=coins.filter(c=>{if(hits(pr,c)){score+=c.val;snd('coin');emit(c.x+9,c.y+9,c.val===50?'#00ff66':'#ffd700',8,400,250,2.5);return false;}return true;});

  blasts.forEach(b=>{const br={x:b.x-14,y:b.y-14,w:28,h:28};
    zombies=zombies.filter(z=>{if(hits(br,z)){z.hp--;if(z.hp<=0){score+=z.type==='big'?35:15;snd('zombiedeath');emit(z.x+z.w/2,z.y+z.h/2,'#4a8a3a',15,450,250,3);emit(z.x+z.w/2,z.y+10,'#661010',8,400,180,2.5);return false;}emit(z.x+z.w/2,z.y+z.h/2,'#88ff44',4,250,100,2);return true;}return true;});});

  if(invT<=0){for(const z of zombies){const zr={x:z.x+5,y:z.y+5,w:z.w-10,h:z.h-6};
    if(hits(pr,zr)){lives--;invT=1.5;shakeT=.3;shakeI=10;snd('hit');emit(P.x+P.w/2,P.y+P.h/2,'#ff0000',12,450,180,3);if(lives<=0){state='gameover';snd('gameover');}break;}}}
}

// ===== RENDER =====
function render(){
  X.save();if(shakeT>0){const si=shakeI*(shakeT/.3);X.translate((Math.random()-.5)*si,(Math.random()-.5)*si);}
  if(state==='start')drawStart();
  else if(state==='playing'){
    drawBG(1/60);coins.forEach(drawCoin);zombies.forEach(drawZ);drawN();blasts.forEach(drawB);
    particles.forEach(p=>{const a=Math.min(1,p.life/p.mx*2);X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2|0,p.y-p.sz/2|0,p.sz,p.sz);});X.globalAlpha=1;
    const vg=X.createRadialGradient(W/2,H/2,H*.4,W/2,H/2,W*.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.35)');X.fillStyle=vg;X.fillRect(0,0,W,H);drawHUD();
  } else {drawBG(1/60);zombies.forEach(drawZ);drawN();drawGO();}
  X.restore();
}

// ===== GAME LOOP (proper delta-time) =====
let lastT=0;
function gameLoop(ts){
  if(!lastT)lastT=ts;
  let dt=(ts-lastT)/1000;lastT=ts;
  if(dt>.05)dt=.05; // cap at 50ms to prevent spiral of death
  update(dt);render();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
