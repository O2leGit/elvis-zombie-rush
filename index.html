<script>
const C=document.getElementById('game'),X=C.getContext('2d');
C.width=900;C.height=550;const W=900,H=550,GY=420;

// ============================================================
// AUDIO -- created LAZILY on first user gesture (expert fix)
// ============================================================
let AC=null,MG=null;
function ensureAudio(){
  if(AC){if(AC.state==='suspended')AC.resume();return;}
  AC=new AudioContext();
  MG=AC.createGain();MG.gain.value=1.0;MG.connect(AC.destination);
  AC.resume();
  const silentBuf=AC.createBuffer(1,1,AC.sampleRate);
  const s=AC.createBufferSource();s.buffer=silentBuf;s.connect(AC.destination);s.start();
  console.log('Audio created, state:',AC.state);
}
['click','touchend','keydown','mousedown','pointerup'].forEach(e=>{
  document.addEventListener(e,()=>{
    if(!AC)ensureAudio();
    else if(AC.state==='suspended')AC.resume();
  },{once:false});
});

function snd(type){
  if(!AC)return;if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(MG);const t=AC.currentTime;
  switch(type){
    case'jump':o.type='triangle';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(560,t+.1);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.13);o.start(t);o.stop(t+.13);break;
    case'land':o.type='sine';o.frequency.setValueAtTime(90,t);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);break;
    case'coin':o.type='sine';o.frequency.setValueAtTime(950,t);o.frequency.exponentialRampToValueAtTime(1500,t+.04);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.09);{const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(MG);o2.type='sine';o2.frequency.setValueAtTime(1500,t+.05);o2.frequency.exponentialRampToValueAtTime(1900,t+.1);g2.gain.setValueAtTime(.18,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.16);o2.start(t+.05);o2.stop(t+.16);}break;
    case'hit':o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(35,t+.22);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28);nB(.18,.25);break;
    case'blast':o.type='sawtooth';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(750,t+.05);o.frequency.exponentialRampToValueAtTime(30,t+.28);g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.32);o.start(t);o.stop(t+.32);nB(.22,.25);break;
    case'zombiedeath':o.type='square';o.frequency.setValueAtTime(550,t);o.frequency.exponentialRampToValueAtTime(45,t+.22);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28);break;
    case'gameover':[400,260,160,100,60].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.15));o.type='square';g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.75);o.start(t);o.stop(t+.75);break;
    case'start':[380,500,630,780,1000].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.06));o.type='square';g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35);break;
    case'lunge':o.type='square';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(350,t+.05);o.frequency.exponentialRampToValueAtTime(45,t+.12);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);break;
    case'groan':o.type='sawtooth';o.frequency.setValueAtTime(50+Math.random()*30,t);o.frequency.exponentialRampToValueAtTime(35,t+.5);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);break;
    case'thunder':o.type='sawtooth';o.frequency.setValueAtTime(42,t);o.frequency.setValueAtTime(28,t+.4);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+1);o.start(t);o.stop(t+1);nB(.7,.3);break;
    case'step':o.type='sine';o.frequency.setValueAtTime(50+Math.random()*40,t);g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.start(t);o.stop(t+.04);break;
    case'gunshot':o.type='square';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(100,t+.06);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);nB(.06,.3);break;
    case'shuriken':o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(600,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);break;
    case'bomb':o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(30,t+.4);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);nB(.4,.35);break;
    case'weaponswitch':o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.setValueAtTime(800,t+.03);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06);break;
    case'explosion':o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(20,t+.5);g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);nB(.5,.4);break;
  }
}
function nB(dur,vol){if(!AC)return;const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*vol*(1-i/d.length);const s=AC.createBufferSource(),ng=AC.createGain();s.buffer=b;s.connect(ng);ng.connect(MG);ng.gain.setValueAtTime(vol,AC.currentTime);ng.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);s.start();}

// ============================================================
// HORROR AMBIENT -- programmatic AudioBuffer horror track
// ============================================================
let ambOn=false;
let heartT=0,scareT=0,boomT=0;

function createHorrorTrack(){
  const len=AC.sampleRate*4;
  const buf=AC.createBuffer(2,len,AC.sampleRate);
  const L=buf.getChannelData(0);
  const R=buf.getChannelData(1);

  for(let i=0;i<len;i++){
    const t=i/AC.sampleRate;

    // Layer 1: Dark pad chord (Cm -- C, Eb, G at low octave)
    const pad=Math.sin(t*2*Math.PI*65.4)*0.08
            +Math.sin(t*2*Math.PI*77.8)*0.06
            +Math.sin(t*2*Math.PI*98.0)*0.05
            +Math.sin(t*2*Math.PI*130.8)*0.03;

    // Layer 2: Slow pulsing (volume swell)
    const pulse=0.5+0.5*Math.sin(t*2*Math.PI*0.25);

    // Layer 3: Eerie high whistle that drifts
    const whistle=Math.sin(t*2*Math.PI*(800+Math.sin(t*0.7)*200))*0.015;

    // Layer 4: Subtle noise texture
    const noise=(Math.random()*2-1)*0.01;

    // Layer 5: Deep heartbeat-like pulse (2 thumps per 4 seconds)
    let heart=0;
    const beatT=t%2;
    if(beatT<0.08)heart=Math.sin(beatT*Math.PI/0.08)*Math.sin(beatT*2*Math.PI*80)*0.15;
    if(beatT>0.12&&beatT<0.18)heart=Math.sin((beatT-0.12)*Math.PI/0.06)*Math.sin((beatT-0.12)*2*Math.PI*60)*0.10;

    // Layer 6: Dissonant interval that fades in and out
    const dissonance=Math.sin(t*2*Math.PI*69.3)*0.04*(0.5+0.5*Math.sin(t*Math.PI*0.5));

    const sample=(pad*pulse+whistle+noise+heart+dissonance)*0.9;

    // Stereo widening
    L[i]=sample+Math.sin(t*2*Math.PI*73)*0.02;
    R[i]=sample+Math.sin(t*2*Math.PI*78)*0.02;
  }

  return buf;
}

function startAmbient(){
  if(ambOn||!AC)return;ambOn=true;
  if(AC.state==='suspended')AC.resume();

  // HORROR MUSIC TRACK -- looping AudioBuffer
  const track=createHorrorTrack();
  const src=AC.createBufferSource();
  const trackGain=AC.createGain();
  src.buffer=track;
  src.loop=true;
  src.connect(trackGain);
  trackGain.connect(AC.destination);
  trackGain.gain.value=0.8;
  src.start();

  // WIND: gain .15 -- DIRECT to destination (kept from original)
  const wb=AC.createBuffer(1,AC.sampleRate*6,AC.sampleRate),wd=wb.getChannelData(0);
  for(let i=0;i<wd.length;i++)wd[i]=(Math.random()*2-1)*.7*(.2+.8*Math.sin(i/AC.sampleRate*.25)**2);
  const wn=AC.createBufferSource(),wg=AC.createGain(),wf=AC.createBiquadFilter();
  wn.buffer=wb;wn.loop=true;wf.type='bandpass';wf.frequency.value=900;wf.Q.value=.4;
  wn.connect(wf);wf.connect(wg);wg.connect(AC.destination);wg.gain.value=.15;wn.start();
  const wl=AC.createOscillator(),wlg=AC.createGain();wl.type='sine';wl.frequency.value=.2;wlg.gain.value=300;
  wl.connect(wlg);wlg.connect(wf.frequency);wl.start();

  heartT=.3;scareT=1.5;boomT=4;
}

function updateAmbient(dt){
  if(!ambOn||state!=='playing'||!AC)return;
  if(AC.state==='suspended')AC.resume();

  // RANDOM SCARY SOUNDS -- connected to AC.destination directly
  scareT-=dt;
  if(scareT<=0){
    scareT=1.8+Math.random()*2.5;
    const t=AC.currentTime,r=Math.random();
    if(r<.18){
      const wb=AC.createBuffer(1,AC.sampleRate*.6,AC.sampleRate),wd=wb.getChannelData(0);
      for(let i=0;i<wd.length;i++)wd[i]=(Math.random()*2-1)*(1-i/wd.length)*.4;
      const ws=AC.createBufferSource(),wg=AC.createGain(),wf=AC.createBiquadFilter();
      ws.buffer=wb;wf.type='bandpass';wf.frequency.value=2000+Math.random()*2500;wf.Q.value=4;
      ws.connect(wf);wf.connect(wg);wg.connect(AC.destination);wg.gain.setValueAtTime(.12,t);wg.gain.exponentialRampToValueAtTime(.001,t+.6);ws.start(t);
    } else if(r<.32){
      const sc=AC.createOscillator(),sg=AC.createGain();sc.type='sawtooth';
      sc.frequency.setValueAtTime(300,t);sc.frequency.exponentialRampToValueAtTime(1200,t+.15);sc.frequency.exponentialRampToValueAtTime(140,t+.5);
      sc.connect(sg);sg.connect(AC.destination);sg.gain.setValueAtTime(.03,t);sg.gain.setValueAtTime(.08,t+.06);sg.gain.exponentialRampToValueAtTime(.001,t+.55);
      sc.start(t);sc.stop(t+.55);
    } else if(r<.46){
      const cr=AC.createOscillator(),cg=AC.createGain();cr.type='triangle';
      cr.frequency.setValueAtTime(200+Math.random()*200,t);cr.frequency.exponentialRampToValueAtTime(450+Math.random()*250,t+.1);cr.frequency.exponentialRampToValueAtTime(90,t+.35);
      cr.connect(cg);cg.connect(AC.destination);cg.gain.setValueAtTime(.06,t);cg.gain.exponentialRampToValueAtTime(.001,t+.35);cr.start(t);cr.stop(t+.35);
    } else if(r<.58){
      const gr=AC.createOscillator(),gg=AC.createGain(),gf=AC.createBiquadFilter();
      gr.type='sawtooth';gr.frequency.setValueAtTime(50+Math.random()*25,t);gf.type='lowpass';gf.frequency.value=100;
      gr.connect(gf);gf.connect(gg);gg.connect(AC.destination);gg.gain.setValueAtTime(.15,t);gg.gain.exponentialRampToValueAtTime(.001,t+.6);
      gr.start(t);gr.stop(t+.6);
    } else if(r<.7){
      for(let i=0;i<6;i++){
        const nb=AC.createBuffer(1,AC.sampleRate*.02,AC.sampleRate),nd=nb.getChannelData(0);
        for(let j=0;j<nd.length;j++)nd[j]=(Math.random()*2-1)*.6;
        const ns=AC.createBufferSource(),ng=AC.createGain(),nf=AC.createBiquadFilter();
        ns.buffer=nb;nf.type='highpass';nf.frequency.value=3500;
        ns.connect(nf);nf.connect(ng);ng.connect(AC.destination);ng.gain.setValueAtTime(.08,t+i*.05);ng.gain.exponentialRampToValueAtTime(.001,t+i*.05+.03);ns.start(t+i*.05);
      }
    } else if(r<.82){
      const ee=AC.createOscillator(),eg=AC.createGain();ee.type='sine';
      ee.frequency.setValueAtTime(1600+Math.random()*900,t);ee.frequency.exponentialRampToValueAtTime(700,t+.7);
      ee.connect(eg);eg.connect(AC.destination);eg.gain.setValueAtTime(.03,t);eg.gain.setValueAtTime(.06,t+.15);eg.gain.exponentialRampToValueAtTime(.001,t+.7);
      ee.start(t);ee.stop(t+.7);
    } else {
      const cl=AC.createOscillator(),clg=AC.createGain();cl.type='square';
      cl.frequency.setValueAtTime(600,t);cl.frequency.setValueAtTime(700,t+.05);cl.frequency.setValueAtTime(600,t+.1);cl.frequency.setValueAtTime(750,t+.15);cl.frequency.setValueAtTime(550,t+.2);
      cl.connect(clg);clg.connect(AC.destination);clg.gain.setValueAtTime(.04,t);clg.gain.exponentialRampToValueAtTime(.001,t+.3);
      cl.start(t);cl.stop(t+.3);
    }
  }

  // DEEP BOOM
  boomT-=dt;
  if(boomT<=0){
    boomT=6+Math.random()*5;
    const t=AC.currentTime;
    const bm=AC.createOscillator(),bg=AC.createGain();bm.type='sine';
    bm.frequency.setValueAtTime(40,t);bm.frequency.exponentialRampToValueAtTime(14,t+.9);
    bm.connect(bg);bg.connect(AC.destination);bg.gain.setValueAtTime(.18,t);bg.gain.exponentialRampToValueAtTime(.001,t+1);
    bm.start(t);bm.stop(t+1);nB(.3,.15);
  }
}

// ============================================================
// GAME STATE
// ============================================================
let state='start',score=0,lives=3,invT=0,blastCD=0,frame=0;
let shakeT=0,shakeI=0,lightT=0,lightX=0;
let playerName='';
let explosions=[];

// ============================================================
// HIGH SCORES -- localStorage + Elvis always 100 above best
// ============================================================
function getScores(){
  try{const s=JSON.parse(localStorage.getItem('ezr_scores'));if(Array.isArray(s))return s;}catch(e){}
  return[];
}
function saveScores(s){try{localStorage.setItem('ezr_scores',JSON.stringify(s));}catch(e){}}
function getTop3(){
  let scores=getScores();
  const bestReal=scores.length>0?scores[0].score:0;
  const elvis={name:'ELVIS',score:Math.max(bestReal+100,200)};
  const all=[elvis,...scores];
  all.sort((a,b)=>b.score-a.score);
  return all.slice(0,3);
}
function addScore(name,sc){
  let scores=getScores();
  scores.push({name:name.toUpperCase().slice(0,10),score:sc});
  scores.sort((a,b)=>b.score-a.score);
  scores=scores.slice(0,10);
  saveScores(scores);
}
function drawScoreboard(y){
  const top3=getTop3();
  X.fillStyle='#aa88dd';X.font='bold 16px Courier New';X.textAlign='center';
  X.fillText('HIGH SCORES',W/2,y);
  top3.forEach((s,i)=>{
    const colors=['#ffd700','#c0c0c0','#cd7f32'];
    X.fillStyle=colors[i]||'#888';X.font='bold 14px Courier New';
    const medal=['1st','2nd','3rd'][i];
    X.fillText(`${medal}  ${s.name.padEnd(10,' ')}  ${s.score}`,W/2,y+22+i*20);
  });
}

// ============================================================
// PHYSICS -- tuned for FIXED 60hz timestep (Gaffer on Games)
// ============================================================
const DT=1/60;
const GRAVITY=0.65,JUMP_V=-11,MSPD=5,FRIC=.78;

const P={x:120,y:GY-48,w:36,h:48,vy:0,vx:0,gnd:true,face:1,anim:0,run:false,wasGnd:true};
let zombies=[],coins=[],blasts=[],particles=[],rain=[],clouds=[],tombs=[],bats=[],platforms=[];

// ============================================================
// PLATFORMS -- spooky wooden planks at different heights
// ============================================================
const PLAT_DEFS=[
  {x:80,y:280,w:90,h:14},
  {x:250,y:310,w:100,h:14},
  {x:440,y:250,w:85,h:14},
  {x:600,y:320,w:95,h:14},
  {x:750,y:270,w:80,h:14},
];

function initPlatforms(){
  platforms=PLAT_DEFS.map(p=>({x:p.x,y:p.y,w:p.w,h:p.h}));
}

function drawPlatform(p){
  const px=p.x|0,py=p.y|0,pw=p.w,ph=p.h;
  // Shadow underneath
  X.fillStyle='rgba(0,0,0,.4)';
  X.fillRect(px+3,py+ph,pw,4);
  // Main plank body -- dark wood
  const wg=X.createLinearGradient(px,py,px,py+ph);
  wg.addColorStop(0,'#3a2818');wg.addColorStop(.4,'#4a3420');wg.addColorStop(.6,'#3a2a18');wg.addColorStop(1,'#2a1a10');
  X.fillStyle=wg;X.fillRect(px,py,pw,ph);
  // Wood grain lines
  X.strokeStyle='rgba(20,10,5,.4)';X.lineWidth=1;
  for(let i=0;i<4;i++){
    const gy=py+3+i*3;
    X.beginPath();X.moveTo(px+2,gy);
    X.lineTo(px+pw-2,gy+(Math.sin(i*2.3)*1.5));X.stroke();
  }
  // Nail dots
  X.fillStyle='#555';
  X.fillRect(px+4,py+3,3,3);X.fillRect(px+pw-7,py+3,3,3);
  X.fillRect(px+4,py+ph-5,3,3);X.fillRect(px+pw-7,py+ph-5,3,3);
  // Green moss patches
  X.fillStyle='#2a5a2a';
  X.fillRect(px+8,py,12,3);
  X.fillRect(px+pw-22,py,10,2);
  X.fillStyle='#1a4a1a';
  X.fillRect(px+pw*.4,py,8,2);
  // Eerie green glow from below
  const gg=X.createRadialGradient(px+pw/2,py+ph+8,0,px+pw/2,py+ph+8,pw*.4);
  gg.addColorStop(0,'rgba(40,120,60,.08)');gg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=gg;X.beginPath();X.ellipse(px+pw/2,py+ph+8,pw*.4,12,0,0,6.28);X.fill();
  // Top highlight edge
  X.fillStyle='rgba(90,70,50,.3)';X.fillRect(px,py,pw,1);
  // Cracks
  X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=1;
  X.beginPath();X.moveTo(px+pw*.3,py);X.lineTo(px+pw*.32,py+ph);X.stroke();
  X.beginPath();X.moveTo(px+pw*.7,py);X.lineTo(px+pw*.68,py+ph);X.stroke();
}

// ============================================================
// WEAPONS -- press 1-4 or cycle with C
// ============================================================
const WEAPONS=[
  {name:'BLADE',color:'#00ccff',cd:.7,spd:14,life:35,sz:10,dmg:1,sound:'blast',desc:'Energy sword wave',pierce:false,aoe:0},
  {name:'GUN',color:'#ffaa00',cd:.3,spd:22,life:25,sz:5,dmg:1,sound:'gunshot',desc:'Fast bullets',pierce:false,aoe:0},
  {name:'SHURIKEN',color:'#cc44ff',cd:.5,spd:10,life:50,sz:7,dmg:1,sound:'shuriken',desc:'Piercing stars',pierce:true,aoe:0},
  {name:'BOMB',color:'#ff3300',cd:1.5,spd:8,life:40,sz:14,dmg:3,sound:'bomb',desc:'Explosive blast',pierce:false,aoe:80},
];
let curWeapon=0;

function switchWeapon(idx){
  if(idx<0||idx>=WEAPONS.length)return;
  if(idx===curWeapon)return;
  curWeapon=idx;
  snd('weaponswitch');
}
function cycleWeapon(){
  switchWeapon((curWeapon+1)%WEAPONS.length);
}

// ============================================================
// INPUT
// ============================================================
const K={},TC={left:false,right:false,jump:false,blast:false};
function tryGo(){
  if(state==='playing')return;
  ensureAudio();
  if(!playerName){playerName=prompt('Enter your name for the scoreboard:','PLAYER');if(!playerName)playerName='PLAYER';playerName=playerName.toUpperCase().slice(0,10);}
  go();
}
document.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='Space')e.preventDefault();
  if(state!=='playing')tryGo();
  if(e.code==='Digit1')switchWeapon(0);
  if(e.code==='Digit2')switchWeapon(1);
  if(e.code==='Digit3')switchWeapon(2);
  if(e.code==='Digit4')switchWeapon(3);
  if(e.code==='KeyC')cycleWeapon();
});
document.addEventListener('keyup',e=>{K[e.code]=false;});
C.addEventListener('click',()=>{if(state!=='playing')tryGo();});
C.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();if(AC)AC.resume();if(state!=='playing')tryGo();},{passive:false});
function bB(id,key){const b=document.getElementById(id);if(!b)return;
  const on=e=>{e.preventDefault();TC[key]=true;if(state!=='playing')tryGo();};
  const off=e=>{e.preventDefault();TC[key]=false;};
  b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('touchcancel',off,{passive:false});b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);
}
bB('bl','left');bB('br','right');bB('bj','jump');bB('bb','blast');

// Resize -- supports portrait and landscape on mobile
function resize(){
  const mob=window.innerWidth<=1024||'ontouchstart'in window;
  const vw=window.innerWidth,vh=window.innerHeight;
  const landscape=mob&&vw>vh;
  const pad=mob?0:20;
  const bp=mob?(landscape?0:120):0;
  const s=Math.min((vw-pad*2)/W,(vh-pad*2-bp)/H,1.5);
  C.style.width=(W*s)+'px';C.style.height=(H*s)+'px';
  if(mob){C.style.border='none';C.style.boxShadow='none';}
  const tui=document.getElementById('tui');
  const bl=document.getElementById('bl'),br=document.getElementById('br');
  const bj=document.getElementById('bj'),bb=document.getElementById('bb');
  if(mob&&landscape){
    tui.style.height='100%';tui.style.bottom='0';
    bl.style.bottom='50%';bl.style.left='10px';bl.style.transform='translateY(50%)';
    br.style.bottom='50%';br.style.left='84px';br.style.transform='translateY(50%)';
    bj.style.bottom='50%';bj.style.right='80px';bj.style.transform='translateY(50%)';
    bb.style.bottom='50%';bb.style.right='4px';bb.style.transform='translateY(50%)';
  } else if(mob){
    tui.style.height='140px';tui.style.bottom='0';
    [bl,br,bj,bb].forEach(b=>{if(b){b.style.transform='';b.style.bottom='20px';}});
    bl.style.left='16px';br.style.left='90px';bj.style.right='90px';bb.style.right='10px';
  }
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,100));
resize();

// Environment
function initEnv(){
  rain=[];for(let i=0;i<150;i++)rain.push({x:Math.random()*W,y:Math.random()*H,s:3+Math.random()*5,sp:8+Math.random()*7});
  clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W,y:12+Math.random()*80,w:100+Math.random()*150,h:22+Math.random()*40,sp:.2+Math.random()*.35});
  tombs=[];for(let i=0;i<8;i++)tombs.push({x:55+i*105+Math.random()*40,h:18+Math.random()*25,w:14+Math.random()*10,tilt:(Math.random()-.5)*.15});
  bats=[];for(let i=0;i<7;i++)bats.push({x:Math.random()*W,y:45+Math.random()*140,sp:1+Math.random()*1.8,amp:15+Math.random()*30,ph:Math.random()*6.28,wt:Math.random()*10});

initEnv();

function go(){
  ensureAudio();
  state='playing';score=0;lives=3;invT=0;blastCD=0;curWeapon=0;
  P.x=120;P.y=GY-P.h;P.vy=0;P.vx=0;P.gnd=true;
  zombies=[];coins=[];blasts=[];particles=[];explosions=[];healthPacks=[];curWeapon=0;initEnv();
  spawnZT=30;spawnCT=20;heartT=.3;scareT=1;boomT=3;
  if(AC){
    AC.resume().then(()=>{
      console.log('AudioContext running:',AC.state);
      const tb=AC.createOscillator(),tg=AC.createGain();
      tb.type='sine';tb.frequency.value=440;
      tb.connect(tg);tg.connect(AC.destination);
      tg.gain.setValueAtTime(.3,AC.currentTime);
      tg.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);
      tb.start(AC.currentTime);tb.stop(AC.currentTime+.1);
      snd('start');
      startAmbient();
    });
  }
}

// Particles
function emit(x,y,col,n,sp,up,sz){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*(sp||8),vy:(Math.random()-.5)*(sp||8)-(up||3),life:25+Math.random()*30,mx:55,col,sz:1.5+Math.random()*(sz||3),grav:12});}

function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// Spawn -- speeds in px/frame at 60fps
let spawnZT=30,spawnCT=20,spawnHT=300;
let healthPacks=[];

function spawnHealth(){
  // Spawn on a platform or on the ground
  if(platforms.length>0&&Math.random()<.6){
    const pl=platforms[Math.floor(Math.random()*platforms.length)];
    healthPacks.push({x:pl.x+pl.w/2-8,y:pl.y-22,w:16,h:16,life:600});
  } else {
    healthPacks.push({x:50+Math.random()*(W-100),y:GY-20-Math.random()*40,w:16,h:16,life:600});
  }
}

function drawHealth(hp){
  const px=hp.x|0,py=hp.y|0;
  const bob=Math.sin(frame*.08+hp.x)*2;
  // Glow
  const gg=X.createRadialGradient(px+8,py+8+bob,0,px+8,py+8+bob,16);
  gg.addColorStop(0,'rgba(255,50,50,.25)');gg.addColorStop(1,'rgba(255,0,0,0)');
  X.fillStyle=gg;X.beginPath();X.arc(px+8,py+8+bob,16,0,6.28);X.fill();
  // White box with red cross
  X.fillStyle='#fff';X.fillRect(px+1,py+1+bob,14,14);
  X.fillStyle='#ee2222';
  X.fillRect(px+6,py+2+bob,4,12); // vertical bar
  X.fillRect(px+2,py+6+bob,12,4); // horizontal bar
  // Flashing when about to expire
  if(hp.life<120&&Math.floor(frame/8)%2===0){
    X.fillStyle='rgba(255,255,255,.4)';X.fillRect(px+1,py+1+bob,14,14);
  }
}
function spawnZ(){
  const level=Math.min(Math.floor(score/200),9);
  const sp=1.8+level*.5;
  const R=Math.random()>.3,big=Math.random()>.72,runner=!big&&level>=2&&Math.random()>.5;
  const mul=runner?1.6:(.6+Math.random()*.5);
  zombies.push({x:R?W+20:-50,y:GY-(big?50:42),w:big?36:30,h:big?50:42,
    vx:R?-sp*mul:sp*mul,anim:0,type:big?'big':(runner?'runner':'normal'),
    hp:big?2:1,lungeCD:runner?50+Math.random()*70:0});
  if(Math.random()>.4)snd('groan');
}
function spawnC(){
  if(Math.random()<.5&&platforms.length>0){
    const pl=platforms[Math.floor(Math.random()*platforms.length)];
    coins.push({x:pl.x+10+Math.random()*(pl.w-38),y:pl.y-25,w:18,h:18,val:Math.random()>.78?50:10,t:Math.random()*6.28});

}

function shd(x,y,w){const g=X.createRadialGradient(x+w/2,GY+2,0,x+w/2,GY+2,w*.7);g.addColorStop(0,'rgba(0,0,0,.35)');g.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=g;X.beginPath();X.ellipse(x+w/2,GY+2,w*.7,6,0,0,6.28);X.fill();}
function rR(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath();X.fill();}

  X.fillStyle='#080418';for(let i=0;i<W;i+=3){const th=60+Math.sin(i*.02)*25+Math.sin(i*.05)*15+Math.sin(i*.13)*8;X.fillRect(i,GY-100-th,3,th+100);}
  const hx=520;X.fillStyle='#0a0418';X.fillRect(hx,GY-180,130,180);X.beginPath();X.moveTo(hx-15,GY-180);X.lineTo(hx+65,GY-240);X.lineTo(hx+145,GY-180);X.fill();X.fillRect(hx+45,GY-270,35,90);X.beginPath();X.moveTo(hx+40,GY-270);X.lineTo(hx+62,GY-310);X.lineTo(hx+85,GY-270);X.fill();X.fillRect(hx+110,GY-220,14,40);

// NINJA -- with weapon-specific held item visuals

function drawN(){
  if(invT>0&&Math.floor(frame/3)%2===0)return;
  const px=P.x|0,py=P.y|0,f=P.face;
  shd(px,py,P.w);
  // Scarf
  const sw=Math.sin(frame*.12)*4;
  X.fillStyle='#cc1122';
  X.fillRect(px+(f>0?6:22),py+4,2,10);
  X.fillRect(px+(f>0?4:24)+sw*.5,py+8,2,10);
  X.fillRect(px+(f>0?2:26)+sw,py+12,2,8);
  // Body
  X.fillStyle='#1a0e30';X.fillRect(px+10,py+10,16,22);
  // Head
  X.fillStyle='#14082a';X.fillRect(px+9,py,18,14);
  // Mask
  X.fillStyle='#0a0418';X.fillRect(px+9,py+4,18,5);
  // Eye
  const blink=frame%180<3?1:4;
  X.fillStyle='#ff2020';X.fillRect(px+(f>0?18:10),py+5,5,blink);
  if(blink>1){const eg=X.createRadialGradient(px+(f>0?20:12),py+6,0,px+(f>0?20:12),py+6,8);eg.addColorStop(0,'rgba(255,40,40,.3)');eg.addColorStop(1,'rgba(255,0,0,0)');X.fillStyle=eg;X.fillRect(px+(f>0?14:4),py,14,14);}
  // Belt
  X.fillStyle='#4a1a1a';X.fillRect(px+10,py+28,16,3);
  X.fillStyle='#c8a820';X.fillRect(px+15,py+28,6,3);
  // Katana on back
  X.fillStyle='#606070';X.fillRect(px+(f>0?5:26),py-8,3,30);
  X.fillStyle='#c8a820';X.fillRect(px+(f>0?3:24),py+16,7,3);

  // Weapon-specific held item
  const wp=WEAPONS[curWeapon];
  const cdP=blastCD/(wp.cd);
  const handX=px+(f>0?38:-2);
  const handY=py+14;

  if(cdP>.5){
    // Attack animation arm
    X.fillStyle='#14082a';X.fillRect(px+(f>0?26:-2),py+12,12*f,5);

    if(curWeapon===0){
      // BLADE: energy glow at hand
      const cs=3+Math.sin(frame*.4)*2;
      const cg=X.createRadialGradient(handX,handY,0,handX,handY,cs+6);
      cg.addColorStop(0,wp.color+'cc');cg.addColorStop(.5,wp.color+'55');cg.addColorStop(1,wp.color+'00');
      X.fillStyle=cg;X.beginPath();X.arc(handX,handY,cs+6,0,6.28);X.fill();
    } else if(curWeapon===1){
      // GUN: pistol shape in hand
      X.fillStyle='#444';
      X.fillRect(handX-3*f,handY-2,10*f,4); // barrel
      X.fillStyle='#333';
      X.fillRect(handX,handY+1,4*f,7); // grip
      // Muzzle flash
      X.fillStyle='#ffaa00';X.fillRect(handX+8*f,handY-1,3*f,2);
    } else if(curWeapon===2){
      // SHURIKEN: nothing special in hand (star is the projectile)
    } else if(curWeapon===3){
      // BOMB: round bomb in hand
      X.fillStyle='#222';X.beginPath();X.arc(handX+3*f,handY,5,0,6.28);X.fill();
      X.fillStyle='#111';X.beginPath();X.arc(handX+3*f,handY,3,0,6.28);X.fill();
      // Fuse
      X.strokeStyle='#886';X.lineWidth=1;
      X.beginPath();X.moveTo(handX+3*f,handY-5);X.lineTo(handX+6*f,handY-9);X.stroke();
      // Fuse spark
      X.fillStyle='#ff8800';X.fillRect(handX+5*f,handY-10,2,2);
    }
  } else {
    // Idle arms
    const as=P.run?Math.sin(P.anim*.3)*5:0;
    X.fillStyle='#14082a';X.fillRect(px+6,py+12+as,4,14);X.fillRect(px+26,py+12-as,4,14);

    // Held weapon in idle pose
    if(curWeapon===1){
      // GUN: small pistol at side
      const ix=px+(f>0?30:2);const iy=py+22+as*(f>0?-1:1);
      X.fillStyle='#444';X.fillRect(ix,iy,6*f,3);
      X.fillStyle='#333';X.fillRect(ix+2*f,iy+2,3*f,5);
    } else if(curWeapon===3){
      // BOMB: bomb at side
      const ix=px+(f>0?30:2);const iy=py+20+as*(f>0?-1:1);
      X.fillStyle='#222';X.beginPath();X.arc(ix+3*f,iy,4,0,6.28);X.fill();
    }
  }

  // Legs
  const lo=P.run?Math.sin(P.anim*.25)*6:0;
  X.fillStyle='#120828';X.fillRect(px+11,py+32,6,14+lo);X.fillRect(px+19,py+32,6,14-lo);
  // Feet
  X.fillStyle='#1a1025';X.fillRect(px+10,py+44+lo,8,4);X.fillRect(px+18,py+44-lo,8,4);
}

function drawExplosion(ex){

  // Outer orange ring
  const og=X.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,r);
  og.addColorStop(0,`rgba(255,200,50,${alpha*.6})`);
  og.addColorStop(.4,`rgba(255,100,0,${alpha*.5})`);
  og.addColorStop(.7,`rgba(200,30,0,${alpha*.3})`);

  X.fillStyle=og;X.beginPath();X.arc(ex.x,ex.y,r,0,6.28);X.fill();

    X.fillStyle=`rgba(255,255,200,${ia})`;
    X.beginPath();X.arc(ex.x,ex.y,r*.3,0,6.28);X.fill();

}

// ============================================================
// FIXED TIMESTEP UPDATE (runs at exactly 60hz)
// per Gaffer on Games "Fix Your Timestep"
// ============================================================
function update(){
  frame++;if(state!=='playing')return;

  // Ambient audio
  updateAmbient(DT);

  if(Math.random()<.004){lightT=1.2;lightX=100+Math.random()*600;snd('thunder');}

  let mv=false;
  if(K.ArrowLeft||K.KeyA||TC.left){P.vx=-MSPD;P.face=-1;mv=true;}
  else if(K.ArrowRight||K.KeyD||TC.right){P.vx=MSPD;P.face=1;mv=true;}
  else P.vx*=FRIC;
  P.run=mv;

  if((K.Space||K.ArrowUp||K.KeyW||TC.jump)&&P.gnd){P.vy=JUMP_V;P.gnd=false;snd('jump');emit(P.x+P.w/2,P.y+P.h,'rgba(60,40,80,.5)',4,4,0,2);TC.jump=false;}

  // FIRE current weapon
  const wp=WEAPONS[curWeapon];
  if((K.KeyX||TC.blast)&&blastCD<=0){
    blastCD=wp.cd;
    snd(wp.sound);
    blasts.push({x:P.x+(P.face>0?38:-2),y:P.y+20,vx:P.face*wp.spd,vy:0,life:wp.life,mx:wp.life,weapIdx:curWeapon,pierced:{}});
    emit(P.x+P.w/2,P.y+20,wp.color,10,6,2,2);
    TC.blast=false;
  }
  if(blastCD>0)blastCD-=DT;if(blastCD<0)blastCD=0;

  if(mv){P.anim+=.23;if(Math.floor(P.anim)%6===0&&P.gnd&&Math.random()<.3)snd('step');}

  // Save previous bottom BEFORE physics
  const prevBottom=P.y+P.h;

  // Apply gravity and move player
  P.vy+=GRAVITY;P.x+=P.vx;P.y+=P.vy;
  P.wasGnd=P.gnd;
  P.gnd=false;

  // Platform collision -- use SAVED previous bottom (expert fix from ai-futureschool.com)
  const newBottom=P.y+P.h;
  platforms.forEach(function(pl){
    // Player was above platform last frame, now at or below it, and horizontally overlapping
    if(P.vy>=0 && prevBottom<=pl.y+2 && newBottom>=pl.y && P.x+P.w-4>pl.x && P.x+4<pl.x+pl.w){
      P.y=pl.y-P.h;
      P.vy=0;
      P.gnd=true;
      if(!P.wasGnd){snd('land');emit(P.x+P.w/2,pl.y,'rgba(60,40,80,.4)',3,3,0,2);}
    }
  });

  // Ground collision
  if(P.y+P.h>=GY){
    if(!P.wasGnd&&P.vy>4){snd('land');emit(P.x+P.w/2,GY,'rgba(60,40,80,.4)',5,5,0,2);}
    P.y=GY-P.h;P.vy=0;P.gnd=true;
  }

  P.x=Math.max(0,Math.min(W-P.w,P.x));

  if(invT>0)invT-=DT;if(invT<0)invT=0;
  if(shakeT>0)shakeT-=DT;if(shakeT<0)shakeT=0;

  // Update explosions
  explosions.forEach(ex=>ex.frame++);
  explosions=explosions.filter(ex=>ex.frame<ex.maxFrame);

  const level=Math.min(Math.floor(score/200),9);
  const zRate=Math.max(25,90-level*7);
  const cRate=Math.max(18,65-level*5);
  spawnZT--;if(spawnZT<=0){spawnZ();spawnZT=zRate;}
  spawnCT--;if(spawnCT<=0){spawnC();spawnCT=cRate;}
  spawnHT--;if(spawnHT<=0&&lives<3){spawnHealth();spawnHT=400+Math.random()*200;} // only spawn if missing lives

  zombies.forEach(z=>{z.x+=z.vx;z.anim+=.13;
    if(z.type==='runner'&&z.lungeCD!==undefined){z.lungeCD--;const dist=Math.abs(z.x-P.x);
      if(z.lungeCD<=0&&dist<300&&dist>30){z.vx*=2.5;z.lungeCD=80+Math.random()*50;snd('lunge');emit(z.x+z.w/2,z.y+z.h/2,'#ff4444',4,4,1.5,2);}}});
  zombies=zombies.filter(z=>z.x>-60&&z.x<W+60);

  blasts.forEach(b=>{b.x+=b.vx;b.life--;});
  blasts=blasts.filter(b=>b.life>0&&b.x>-30&&b.x<W+30);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life--;p.vx*=.97;});
  particles=particles.filter(p=>p.life>0);

  const pr={x:P.x+5,y:P.y+3,w:P.w-10,h:P.h-6};
  coins=coins.filter(c=>{if(hits(pr,c)){score+=c.val;snd('coin');emit(c.x+9,c.y+9,c.val===50?'#00ff66':'#ffd700',8,6,4,2.5);return false;}return true;});

  // Health packs -- tick life and check collision
  healthPacks.forEach(h=>h.life--);
  healthPacks=healthPacks.filter(h=>h.life>0);
  healthPacks=healthPacks.filter(h=>{
    if(hits(pr,h)&&lives<3){
      lives++;snd('coin');
      emit(h.x+8,h.y+8,'#ff4444',10,5,3,2);
      emit(h.x+8,h.y+8,'#ffffff',6,4,2,2);
      return false;
    }
    return true;
  });

  // Projectile vs zombie collision -- weapon-specific behavior
  blasts.forEach(b=>{
    const bsz=WEAPONS[b.weapIdx].sz;
    const br={x:b.x-bsz,y:b.y-bsz,w:bsz*2,h:bsz*2};
    const wpDef=WEAPONS[b.weapIdx];

    zombies=zombies.filter(z=>{
      if(!hits(br,z))return true;

      // Shuriken: pierce -- track which zombies already hit
      if(wpDef.pierce){
        const zid=z.x.toFixed(0)+'_'+z.y.toFixed(0);
        if(b.pierced[zid])return true;
        b.pierced[zid]=true;
      }

      z.hp-=wpDef.dmg;
      if(z.hp<=0){
        score+=z.type==='big'?35:15;
        snd('zombiedeath');
        emit(z.x+z.w/2,z.y+z.h/2,'#4a8a3a',15,7,4,3);
        emit(z.x+z.w/2,z.y+10,'#661010',8,6,3,2.5);

        // BOMB: area damage -- explosion visual + kill nearby zombies
        if(wpDef.aoe>0){
          snd('explosion');
          shakeT=.4;shakeI=12;
          const cx=z.x+z.w/2,cy=z.y+z.h/2;
          // Create explosion visual
          explosions.push({x:cx,y:cy,frame:0,maxFrame:15});
          emit(cx,cy,'#ff6600',20,10,5,4);
          emit(cx,cy,'#ffcc00',15,12,6,3);
          // Kill all zombies within 80px radius
          zombies.forEach(oz=>{
            if(oz===z)return;
            const dx=oz.x+oz.w/2-cx,dy=oz.y+oz.h/2-cy;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<wpDef.aoe){
              oz.hp-=wpDef.dmg;
              if(oz.hp<=0){
                score+=oz.type==='big'?35:15;
                emit(oz.x+oz.w/2,oz.y+oz.h/2,'#ff8844',12,8,4,3);
              }
            }
          });
          zombies=zombies.filter(oz=>oz.hp>0);
        }
        if(!wpDef.pierce)b.life=0;
        return false;
      }
      emit(z.x+z.w/2,z.y+z.h/2,'#88ff44',4,4,1.5,2);
      if(!wpDef.pierce)b.life=0;
      return true;
    });
  });

  // Check if bomb projectile life expired (create explosion even without hitting zombie)
  blasts.forEach(b=>{
    if(b.weapIdx===3&&b.life<=1){
      const wpDef=WEAPONS[3];
      snd('explosion');
      shakeT=.4;shakeI=12;
      explosions.push({x:b.x,y:b.y,frame:0,maxFrame:15});
      emit(b.x,b.y,'#ff6600',20,10,5,4);
      emit(b.x,b.y,'#ffcc00',15,12,6,3);
      // Kill zombies in radius
      zombies.forEach(oz=>{
        const dx=oz.x+oz.w/2-b.x,dy=oz.y+oz.h/2-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<wpDef.aoe){
          oz.hp-=wpDef.dmg;
          if(oz.hp<=0){
            score+=oz.type==='big'?35:15;
            snd('zombiedeath');
            emit(oz.x+oz.w/2,oz.y+oz.h/2,'#ff8844',12,8,4,3);
          }
        }
      });
      zombies=zombies.filter(oz=>oz.hp>0);
    }
  });

  if(invT<=0){for(const z of zombies){const zr={x:z.x+5,y:z.y+5,w:z.w-10,h:z.h-6};if(hits(pr,zr)){lives--;invT=1.5;shakeT=.3;shakeI=10;snd('hit');emit(P.x+P.w/2,P.y+P.h/2,'#ff0000',12,7,3,3);if(lives<=0){state='gameover';snd('gameover');addScore(playerName||'PLAYER',score);}break;}}}
}

// ============================================================
// RENDER (called at display refresh rate)
// ============================================================
function render(){
  X.save();if(shakeT>0){const si=shakeI*(shakeT/.3);X.translate((Math.random()-.5)*si,(Math.random()-.5)*si);}
  if(state==='start')drawStart();
  else if(state==='playing'){drawBG();coins.forEach(drawCoin);healthPacks.forEach(drawHealth);zombies.forEach(drawZ);drawN();blasts.forEach(drawB);
    // Draw explosions
    explosions.forEach(drawExplosion);
    particles.forEach(p=>{const a=Math.min(1,p.life/p.mx*2);X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2|0,p.y-p.sz/2|0,p.sz,p.sz);});X.globalAlpha=1;
    const vg=X.createRadialGradient(W/2,H/2,H*.4,W/2,H/2,W*.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.35)');X.fillStyle=vg;X.fillRect(0,0,W,H);drawHUD();
  } else {drawBG();zombies.forEach(drawZ);drawN();drawGO();}
  X.restore();
}

// ============================================================
// GAFFER ON GAMES: Fixed timestep with accumulator
// Physics ALWAYS runs at 60hz, render runs at display rate
// ============================================================
let accumulator=0,lastT=0;
function gameLoop(ts){
  if(!lastT){lastT=ts;requestAnimationFrame(gameLoop);return;}
  let frameTime=(ts-lastT)/1000;
  lastT=ts;
  if(frameTime>.25)frameTime=.25;

  accumulator+=frameTime;
  while(accumulator>=DT){
    update();
    accumulator-=DT;
  }
  render();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
